<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thư Ký · Luan</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#f5f0e8;--ink:#1a1814;--paper:#fdfaf4;--border:#ddd8cc;
  --orange:#ec872b;--green:#2d7d5f;--red:#c0392b;--blue:#2c5f8a;
  --muted:#8a8478;--surface:#eee9df;--warm:#f0e8d8;
  --font:'DM Sans',sans-serif;--serif:'Instrument Serif',serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:10px;padding:8px 16px;background:var(--paper);border-bottom:1px solid var(--border);}
.logo{font-family:var(--serif);font-size:18px;display:flex;align-items:center;gap:7px;flex-shrink:0;}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--orange);}
.topbar-mid{flex:1;}
.date-chip{font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--surface);padding:3px 9px;border-radius:20px;}
.api-wrap{display:flex;align-items:center;gap:5px;}
.api-label{font-size:11px;color:var(--muted);}
.api-input{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--ink);font-family:var(--mono);font-size:11px;padding:4px 8px;width:140px;outline:none;}
.api-input:focus{border-color:var(--orange);}
.drive-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:11px;font-family:var(--font);transition:all .2s;white-space:nowrap;}
.drive-btn:hover{border-color:var(--orange);}
.drive-btn.connected{border-color:var(--green);color:var(--green);}
.drive-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);}
.drive-dot.on{background:var(--green);}
.sync-txt{font-size:10px;font-family:var(--mono);color:var(--muted);max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* MODES */
.modes{display:flex;border-bottom:1px solid var(--border);background:var(--paper);}
.mode-btn{padding:9px 16px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.04em;text-transform:uppercase;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font);}
.mode-btn.active{color:var(--orange);border-bottom-color:var(--orange);}
.mode-btn:hover:not(.active){color:var(--ink);}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden;height:calc(100vh - 91px);}

/* CHAT PANEL */
.chat-panel{width:320px;min-width:320px;display:flex;flex-direction:column;border-right:1px solid var(--border);background:var(--paper);}
.chat-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.chat-title{font-size:13px;font-weight:600;}
.mode-badge{font-size:10px;padding:2px 7px;border-radius:10px;font-family:var(--mono);background:var(--surface);color:var(--muted);}
.chat-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:9px;}
.msg{padding:9px 12px;border-radius:12px;font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word;}
.msg.ai{background:var(--warm);border:1px solid var(--border);align-self:flex-start;max-width:95%;border-bottom-left-radius:3px;}
.msg.user{background:var(--orange);color:#fff;align-self:flex-end;max-width:88%;border-bottom-right-radius:3px;}
.msg.sys{background:var(--surface);color:var(--muted);font-size:11px;align-self:center;text-align:center;border-radius:8px;padding:4px 10px;font-family:var(--mono);}
.chat-foot{padding:10px 12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:7px;}
.quick-btns{display:flex;gap:5px;flex-wrap:wrap;}
.qbtn{font-size:11px;padding:3px 9px;border-radius:14px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .15s;font-family:var(--font);}
.qbtn:hover{border-color:var(--orange);color:var(--orange);}
.chat-row{display:flex;gap:6px;}
.chat-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--ink);font-family:var(--font);font-size:13px;padding:8px 11px;outline:none;resize:none;min-height:36px;max-height:90px;}
.chat-input:focus{border-color:var(--orange);}
.send-btn{background:var(--orange);border:none;border-radius:8px;color:#fff;width:36px;cursor:pointer;font-size:17px;flex-shrink:0;}
.send-btn:hover{opacity:.85;}

/* RIGHT */
.right-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* ── BRIEF VIEW ── */
.brief-outer{flex:1;display:flex;overflow:hidden;}

/* Left: AI analysis */
.brief-left{width:300px;min-width:300px;border-right:1px solid var(--border);overflow-y:auto;padding:20px 18px;display:flex;flex-direction:column;gap:14px;}
.brief-greeting{font-family:var(--serif);font-size:22px;line-height:1.3;}
.brief-sub{color:var(--muted);font-size:13px;line-height:1.6;}
.brief-section h3{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:8px;}
.brief-card{background:var(--paper);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:12.5px;line-height:1.5;display:flex;gap:9px;margin-bottom:6px;}
.bc-dot{width:7px;height:7px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.bc-body{flex:1;}
.bc-reason{font-size:11px;color:var(--muted);margin-top:2px;}
.bc-impact{font-size:11px;color:var(--red);margin-top:2px;}
.bc-badge{font-size:10px;font-family:var(--mono);padding:1px 6px;border-radius:8px;background:#eef4fb;color:var(--blue);display:inline-block;margin-top:3px;}
.btn-gen-plan{width:100%;background:var(--orange);color:#fff;border:none;border-radius:8px;padding:11px;font-family:var(--font);font-weight:600;font-size:13px;cursor:pointer;margin-top:4px;}
.btn-gen-plan:hover{opacity:.88;}
.btn-gen-plan:disabled{opacity:.4;cursor:not-allowed;}

/* Right: Day plan (ordered list, draggable) */
.plan-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.plan-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--paper);}
.plan-title{font-size:13px;font-weight:600;}
.plan-hint{font-size:11px;color:var(--muted);}
.plan-list{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:0;}

/* Ordered task rows */
.plan-item{display:flex;align-items:flex-start;gap:10px;padding:10px 10px;border-radius:8px;cursor:grab;transition:background .15s, box-shadow .15s;position:relative;border:1px solid transparent;margin-bottom:4px;background:var(--paper);}
.plan-item:hover{background:var(--warm);border-color:var(--border);}
.plan-item.dragging{opacity:.45;background:var(--surface);}
.plan-item.drag-over{border-color:var(--orange);background:var(--warm);}
.plan-num{font-family:var(--mono);font-size:11px;color:var(--muted);width:20px;flex-shrink:0;padding-top:2px;user-select:none;}
.plan-drag{color:var(--border);font-size:14px;flex-shrink:0;padding-top:1px;cursor:grab;user-select:none;}
.plan-drag:hover{color:var(--muted);}
.plan-body{flex:1;}
.plan-text{font-size:13px;line-height:1.5;}
.plan-text.done-text{text-decoration:line-through;opacity:.45;}
.plan-meta{display:flex;gap:8px;margin-top:3px;flex-wrap:wrap;}
.plan-tag{font-size:10px;font-family:var(--mono);padding:1px 6px;border-radius:6px;}
.plan-why{font-size:11px;color:var(--muted);margin-top:2px;}
.plan-check{width:18px;height:18px;border:1.5px solid var(--border);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;margin-top:2px;transition:all .15s;}
.plan-check.on{background:var(--green);border-color:var(--green);color:#fff;}
.plan-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);text-align:center;padding:40px;gap:10px;font-size:13px;}
.plan-empty-icon{font-size:36px;opacity:.35;}

/* time blocks */
.time-block{font-size:10px;font-family:var(--mono);background:var(--surface);padding:1px 7px;border-radius:8px;color:var(--muted);}
.time-block.morning{color:#b8860b;}
.time-block.afternoon{color:var(--blue);}
.time-block.evening{color:#6b4c9a;}
.energy-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:2px;}

/* DAILY BOARD */
.add-bar{padding:9px 13px;border-bottom:1px solid var(--border);display:flex;gap:7px;background:var(--paper);}
.add-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--ink);font-family:var(--font);font-size:13px;padding:8px 11px;outline:none;}
.add-input:focus{border-color:var(--orange);}
.add-btn{background:var(--ink);color:var(--bg);border:none;border-radius:8px;padding:8px 13px;font-family:var(--font);font-weight:500;font-size:13px;cursor:pointer;}
.add-btn:hover{opacity:.8;}
.stats-bar{display:flex;align-items:center;justify-content:space-between;padding:7px 13px;border-bottom:1px solid var(--border);background:var(--paper);}
.stats-left{display:flex;gap:12px;}
.stat{font-size:12px;color:var(--muted);font-family:var(--mono);}
.stat span{color:var(--ink);font-weight:500;}
.btn-eod{background:var(--ink);color:var(--bg);border:none;border-radius:6px;padding:5px 11px;font-size:12px;font-family:var(--font);cursor:pointer;}
.board-wrap{flex:1;overflow-x:auto;overflow-y:hidden;display:flex;}
.col{min-width:190px;max-width:190px;display:flex;flex-direction:column;border-right:1px solid var(--border);}
.col-head{padding:10px 12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border);background:var(--paper);}
.col-stripe{width:3px;height:12px;border-radius:2px;flex-shrink:0;}
.col-tasks{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px;}
.card{background:var(--paper);border:1px solid var(--border);border-radius:8px;padding:9px 10px;font-size:12px;line-height:1.5;position:relative;transition:border-color .15s,transform .15s;}
.card:hover{border-color:var(--orange);transform:translateY(-1px);}
.card.done{opacity:.35;}
.card.done .card-text{text-decoration:line-through;}
.card-text{padding-right:22px;}
.card-dl{font-size:10px;font-family:var(--mono);color:var(--blue);margin-top:3px;}
.card-note{font-size:10px;color:var(--muted);margin-top:2px;}
.card-check{position:absolute;top:7px;right:7px;width:16px;height:16px;border:1.5px solid var(--border);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .15s;}
.card-check.on{background:var(--green);border-color:var(--green);color:#fff;}
.empty-col{font-size:11px;color:var(--border);text-align:center;padding:12px 6px;}

/* REVIEW */
.review-outer{flex:1;overflow-y:auto;}
.review-wrap{padding:18px;display:flex;flex-direction:column;gap:13px;}
.review-title{font-family:var(--serif);font-size:22px;}
.review-section{background:var(--paper);border:1px solid var(--border);border-radius:10px;padding:13px 15px;}
.review-section h3{font-size:12px;font-weight:600;margin-bottom:10px;}
.review-item{display:flex;align-items:flex-start;gap:9px;padding:7px 9px;border-radius:7px;background:var(--surface);font-size:13px;margin-bottom:6px;}
.review-item-text{flex:1;line-height:1.5;}
.review-actions{display:flex;gap:4px;flex-shrink:0;}
.rac{font-size:11px;padding:3px 8px;border-radius:5px;border:1px solid var(--border);cursor:pointer;font-family:var(--font);background:var(--paper);}
.rac.done2{border-color:var(--green);color:var(--green);}
.rac.migrate{border-color:var(--blue);color:var(--blue);}
.rac.drop{border-color:var(--red);color:var(--red);}
.rac:disabled{opacity:.35;cursor:default;}

/* KHO */
.kho-outer{flex:1;overflow-y:auto;}
.kho-wrap{padding:18px;}
.kho-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.kho-title{font-family:var(--serif);font-size:22px;}
.kho-count{font-family:var(--mono);font-size:12px;color:var(--muted);}
.kho-group{margin-bottom:16px;}
.kho-group-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:7px;}
.kho-card{background:var(--paper);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:5px;}
.kho-card-body{flex:1;}
.kho-card-note{font-size:11px;color:var(--muted);margin-top:2px;}
.kho-meta{font-size:10px;color:var(--muted);font-family:var(--mono);}
.kho-actions{display:flex;gap:4px;flex-direction:column;align-items:flex-end;}
.kbtn{font-size:10px;padding:3px 7px;border-radius:5px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-family:var(--font);white-space:nowrap;}
.kbtn:hover{border-color:var(--orange);color:var(--orange);}
.kbtn.del:hover{border-color:var(--red);color:var(--red);}

/* Misc */
.loading-dot{animation:blink 1.2s infinite;display:inline-block;}
.loading-dot:nth-child(2){animation-delay:.2s;}
.loading-dot:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.toast{position:fixed;bottom:18px;right:18px;background:var(--ink);color:var(--bg);padding:9px 15px;border-radius:8px;font-size:12px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo"><div class="logo-dot"></div>Thư Ký</div>
  <div class="topbar-mid"></div>
  <div class="date-chip" id="dateChip"></div>
  <div class="api-wrap">
    <span class="api-label">Claude</span>
    <input class="api-input" id="apiInput" type="password" placeholder="sk-ant-..." oninput="onApiKey(this.value)">
  </div>
  <button class="drive-btn" id="driveBtn" onclick="handleDriveAuth()">
    <div class="drive-dot" id="driveDot"></div>
    <span id="driveBtnTxt">Kết nối Drive</span>
  </button>
  <span class="sync-txt" id="syncTxt"></span>
</div>

<!-- MODES -->
<div class="modes">
  <button class="mode-btn active" id="tab-brief" onclick="setMode('brief')">☀ Sáng</button>
  <button class="mode-btn" id="tab-daily" onclick="setMode('daily')">📋 Hôm nay</button>
  <button class="mode-btn" id="tab-review" onclick="setMode('review')">🌙 Tổng kết</button>
  <button class="mode-btn" id="tab-kho" onclick="setMode('kho')">🗄 Kho việc</button>
</div>

<!-- MAIN LAYOUT -->
<div class="layout">

  <!-- CHAT (always visible) -->
  <div class="chat-panel">
    <div class="chat-header">
      <div class="chat-title">Thư ký AI</div>
      <div class="mode-badge" id="modeBadge">Buổi sáng</div>
    </div>
    <div class="chat-msgs" id="chatMsgs"></div>
    <div class="chat-foot">
      <div class="quick-btns">
        <button class="qbtn" onclick="quickSend('Giờ này anh làm gì được?')">Làm gì giờ?</button>
        <button class="qbtn" onclick="quickSend('Stress quá, việc nào quan trọng nhất?')">Stress ơi</button>
        <button class="qbtn" onclick="quickSend('Sắp xếp lại thứ tự cho anh')">Sắp xếp lại</button>
        <button class="qbtn" onclick="quickSend('Tổng quan hôm nay thế nào?')">Overview</button>
      </div>
      <div class="chat-row">
        <textarea class="chat-input" id="chatInput" placeholder="Nhắn gì cũng được…" rows="1"
          onkeydown="onChatKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" onclick="sendChat()">↑</button>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">

    <!-- BRIEF -->
    <div id="view-brief" style="display:flex;flex:1;overflow:hidden;" class="brief-outer">
      <!-- Analysis sidebar -->
      <div class="brief-left" id="briefLeft">
        <div class="brief-greeting" id="briefGreeting">Chào buổi sáng, Luan.</div>
        <div class="brief-sub" id="briefSub">Đang chuẩn bị brief…</div>
        <div id="briefSections"></div>
      </div>
      <!-- Day plan -->
      <div class="plan-panel">
        <div class="plan-header">
          <div class="plan-title">📋 Thứ tự làm việc hôm nay</div>
          <div class="plan-hint" id="planHint">Kéo thả để đổi thứ tự · Chat để điều chỉnh</div>
        </div>
        <div class="plan-list" id="planList">
          <div class="plan-empty">
            <div class="plan-empty-icon">☀</div>
            <div>Đợi thư ký brief xong<br>sẽ tự động tạo lịch ngày cho anh</div>
          </div>
        </div>
      </div>
    </div>

    <!-- DAILY BOARD -->
    <div id="view-daily" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
      <div class="add-bar">
        <input class="add-input" id="addInput" placeholder="Nhập việc mới — thô cũng được, thư ký phân tích…" onkeydown="if(event.key==='Enter')addTask()">
        <button class="add-btn" onclick="addTask()">+ Thêm</button>
      </div>
      <div class="stats-bar">
        <div class="stats-left">
          <div class="stat">Xong: <span id="sDone">0</span></div>
          <div class="stat">Còn: <span id="sLeft">0</span></div>
          <div class="stat">Kho: <span id="sKho">0</span></div>
        </div>
        <button class="btn-eod" onclick="setMode('review')">🌙 Tổng kết ngày</button>
      </div>
      <div class="board-wrap" id="boardWrap"></div>
    </div>

    <!-- REVIEW -->
    <div id="view-review" class="review-outer" style="display:none;">
      <div class="review-wrap" id="reviewContent"></div>
    </div>

    <!-- KHO -->
    <div id="view-kho" class="kho-outer" style="display:none;">
      <div class="kho-wrap">
        <div class="kho-header">
          <div class="kho-title">Kho việc</div>
          <div class="kho-count" id="khoCount">0 đầu việc</div>
        </div>
        <div id="khoContent"></div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════
const GOOGLE_CLIENT_ID = '356592007545-e6poq5irp699hj93vfvkqjl7uh5mdggm.apps.googleusercontent.com';
const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file';
const FOLDER_NAME = 'Thư Ký AI';
const FILE_NAME   = 'secretary_data.json';

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let S = {
  tasks: [],
  kho: [],
  plan: [],
  preferences: []
};
function safeS(){ S.tasks=S.tasks||[]; S.plan=S.plan||[]; S.kho=S.kho||[]; S.preferences=S.preferences||[]; return S; }
let chatHistory = [];
let driveToken = null, driveFolderId = null, driveFileId = null;
let syncTimer = null;
let dragSrc = null;

const COLS = [
  {id:'urgent',    label:'Gấp hôm nay',       color:'#c0392b'},
  {id:'today',     label:'Quan trọng hôm nay', color:'#ec872b'},
  {id:'presence',  label:'Cần có mặt',         color:'#2c5f8a'},
  {id:'important', label:'Quan trọng',         color:'#b8860b'},
  {id:'should',    label:'Nên làm',            color:'#2d7d5f'},
  {id:'want',      label:'Muốn làm',           color:'#6b4c9a'},
  {id:'other',     label:'Khác',               color:'#8a8478'},
];

const TIME_BLOCKS = {
  morning:   {label:'Sáng', class:'morning'},
  afternoon: {label:'Chiều', class:'afternoon'},
  evening:   {label:'Tối', class:'evening'},
  anytime:   {label:'Bất kỳ', class:''},
};

// ═══════════════════════════════════════
// LOCAL STORAGE
// ═══════════════════════════════════════
const LS = {
  saveApi(v){ try{localStorage.setItem('tk_api',v);}catch(e){} },
  loadApi(){ try{return localStorage.getItem('tk_api')||'';}catch(e){return '';} },
  saveToken(t){ try{localStorage.setItem('tk_gtoken',t||'');}catch(e){} },
  loadToken(){ try{return localStorage.getItem('tk_gtoken')||null;}catch(e){return null;} },

function handleDriveAuth(){
  if(driveToken){ driveDisconnect(); return; }
  const client = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: DRIVE_SCOPE,
    callback: async(resp)=>{
      if(resp.error){ showToast('❌ Lỗi đăng nhập Google'); return; }
      driveToken = resp.access_token;
      LS.saveToken(driveToken);
      setDriveUI(true);
      showToast('✓ Đã kết nối Google Drive');
      await driveInit();
    }
  });
  client.requestAccessToken();
}
function driveDisconnect(){
  driveToken=null; driveFolderId=null; driveFileId=null;
  LS.saveToken(''); setDriveUI(false); showToast('Đã ngắt Drive');
}
function setDriveUI(on){
  document.getElementById('driveDot').className='drive-dot'+(on?' on':'');
  document.getElementById('driveBtnTxt').textContent=on?'Drive ✓':'Kết nối Drive';
  document.getElementById('driveBtn').className='drive-btn'+(on?' connected':'');
}
async function driveInit(){
  try{
    let res=await driveReq(`https://www.googleapis.com/drive/v3/files?q=name='${FOLDER_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false&fields=files(id)`);
    driveFolderId = res.files?.length ? res.files[0].id : (await driveReq('https://www.googleapis.com/drive/v3/files',{method:'POST',body:JSON.stringify({name:FOLDER_NAME,mimeType:'application/vnd.google-apps.folder'})})).id;
    res=await driveReq(`https://www.googleapis.com/drive/v3/files?q=name='${FILE_NAME}' and '${driveFolderId}' in parents and trashed=false&fields=files(id)`);
    if(res.files?.length){ driveFileId=res.files[0].id; await driveLoad(); }
    else { await driveSave(); }
    renderAll(); setSyncTxt('✓ Drive đồng bộ');
  }catch(e){ setSyncTxt('Drive lỗi'); }
}
async function driveLoad(){
  const res=await fetch(`https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`,{headers:{Authorization:'Bearer '+driveToken}});
  if(!res.ok) return;
  const data=await res.json();
  if(data?.tasks!==undefined){ S=data; S.plan=S.plan||[]; S.kho=S.kho||[]; S.preferences=S.preferences||[]; }
}
async function driveSave(){
  setSyncTxt('⟳ Lưu…');
  const body=JSON.stringify(S,null,2);
  const blob=new Blob([body],{type:'application/json'});
  if(!driveFileId){
    const form=new FormData();
    form.append('metadata',new Blob([JSON.stringify({name:FILE_NAME,parents:[driveFolderId]})],{type:'application/json'}));
    form.append('file',blob);
    const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{method:'POST',headers:{Authorization:'Bearer '+driveToken},body:form});
    driveFileId=(await r.json()).id;
  } else {
    await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`,{method:'PATCH',headers:{Authorization:'Bearer '+driveToken,'Content-Type':'application/json'},body});
  }
  setSyncTxt('✓ Lưu '+new Date().toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'}));
  LS.save();
}
async function driveReq(url,opts={}){
  const r=await fetch(url,{...opts,headers:{Authorization:'Bearer '+driveToken,'Content-Type':'application/json',...(opts.headers||{})}});
  return r.json();
}
function scheduleSave(){ LS.save(); if(!driveToken)return; clearTimeout(syncTimer); syncTimer=setTimeout(driveSave,2000); }
function setSyncTxt(t){ document.getElementById('syncTxt').textContent=t; }

function getKey(){ return (document.getElementById('apiInput').value||'').trim(); }
function onApiKey(v){ LS.saveApi(v); }

async function claude(system, messages, json=false){
  const key=getKey();
  if(!key) throw new Error('NO_KEY');
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:3000,system,messages})
  });
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error?.message||'HTTP '+res.status);}
  const d=await res.json();
  const text=d.content?.[0]?.text||'';
  if(json){try{return JSON.parse(text.replace(/```json|```/g,'').trim());}catch(e){throw new Error('JSON parse lỗi');}}
  return text;
}

Anh Luan: chủ Lantern Travel (inbound miền Bắc VN) và Lumi Á Đông Travel (outbound Nhật/Trung/Hàn). Làm theo Bullet Journal.

CÔNG VIỆC HÔM NAY:
${S.tasks.map(t=>`[${t.col}|${t.status}] ${t.text}${t.deadline?' deadline:'+t.deadline:''}${t.note?' — '+t.note:''}`).join('\n')||'(chưa có)'}

KẾ HOẠCH NGÀY:
${(S.plan||[]).map((p,i)=>`${i+1}. [${p.timeBlock||'anytime'}|${p.done?'xong':'còn'}] ${p.text}`).join('\n')||'(chưa có)'}

KHO VIỆC:
${(S.kho||[]).filter(t=>t.status==='active').map(t=>`[${t.col}] ${t.text}${t.deadline?' '+t.deadline:''}`).join('\n')||'(rỗng)'}

SỞ THÍCH SẮP XẾP ĐÃ HỌC:
${(S.preferences||[]).slice(-10).join('\n')||'(chưa có)'}\`;
}

// DAY PLAN RENDER + DRAG & DROP

function renderPlan(){
  const list=document.getElementById('planList');
  if(!safeS().plan.length){
    list.innerHTML='<div class="plan-empty"><div class="plan-empty-icon">☀</div><div>Đợi thư ký brief xong<br>sẽ tự động tạo lịch ngày</div></div>';
    return;
  }
  list.innerHTML='';
  safeS().plan.forEach((p,i)=>{
    const tb=TIME_BLOCKS[p.timeBlock]||TIME_BLOCKS.anytime;
    const energyColor=p.energy==='high'?'#c0392b':p.energy==='mid'?'#ec872b':'#2d7d5f';
    const item=document.createElement('div');
    item.className='plan-item';
    item.draggable=true;
    item.dataset.idx=i;
    item.innerHTML=`
      <div class="plan-num">${i+1}</div>
      <div class="plan-drag" title="Kéo để đổi thứ tự">⠿</div>
      <div class="plan-body">
        <div class="plan-text${p.done?' done-text':''}">${p.text}</div>
        <div class="plan-meta">
          ${tb.label!=='Bất kỳ'?`<span class="plan-tag time-block ${tb.class}">${tb.label}</span>`:''}
          <span class="plan-tag" style="background:${energyColor}18;color:${energyColor}"><span class="energy-dot" style="background:${energyColor}"></span>${p.energy==='high'?'Cao':p.energy==='mid'?'Vừa':'Nhẹ'}</span>
        </div>
        ${p.why?`<div class="plan-why">${p.why}</div>`:''}
      </div>
      <div class="plan-check${p.done?' on':''}" onclick="togglePlanDone(${i},event)">${p.done?'✓':''}</div>`;

    // Drag events
    item.addEventListener('dragstart',e=>{ dragSrc=i; item.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
    item.addEventListener('dragend',()=>{ item.classList.remove('dragging'); document.querySelectorAll('.plan-item').forEach(el=>el.classList.remove('drag-over')); });
    item.addEventListener('dragover',e=>{ e.preventDefault(); item.classList.add('drag-over'); });
    item.addEventListener('dragleave',()=>item.classList.remove('drag-over'));
    item.addEventListener('drop',e=>{ e.preventDefault(); item.classList.remove('drag-over'); if(dragSrc===null||dragSrc===i)return; const moved=S.plan.splice(dragSrc,1)[0]; S.plan.splice(i,0,moved); dragSrc=null; scheduleSave(); renderPlan(); showToast('Đã đổi thứ tự'); });

    list.appendChild(item);
  });
}

function togglePlanDone(i,e){
  e.stopPropagation();
  if(S.plan[i]) S.plan[i].done=!S.plan[i].done;
  scheduleSave(); renderPlan();
  // sync with task board too
  const planText=S.plan[i]?.text;
  const task=S.tasks.find(t=>t.text===planText);
  if(task){ task.status=S.plan[i].done?'done':'active'; renderBoard(); }
}

// ═══════════════════════════════════════
// CHAT
// ═══════════════════════════════════════
async function sendChat(){
  const inp=document.getElementById('chatInput');
  const msg=inp.value.trim();
  if(!msg) return;
  inp.value=''; autoResize(inp);
  if(!getKey()){addMsg('ai','Anh nhập API key nhé!');return;}
  addMsg('user',msg);
  const loadId=addLoading();

  const sys=`Bạn là thư ký AI của anh Luan. Trả lời ngắn gọn, thực tế, tiếng Việt.

H�ỚNG DẪN XỬ LÝ:
- "làm gì giờ" → gợi ý 2-3 việc phù hợp thời điểm + lý do
- "stress" → chọn 3 việc KEY nhất có impact lớn nhất nếu bỏ qua
- "sắp xếp lại" hoặc yêu cầu đổi thứ tự → trả về JSON có key "reorder" là mảng id mới, kèm giải thích
- học hỏi sở thích: nếu anh nói "tôi hay làm X trước Y" hay "buổi sáng tôi không muốn họp" → ghi nhận vào "new_preference"

Nếu cần reorder hoặc ghi nhận preference, trả về JSON:
{"reply":"...", "reorder":["p1","p2",...] hoặc null, "new_preference":"sở thích mới học được hoặc null"}
Nếu chỉ chat thường, trả về text bình thường.

${buildCtx()}`;

  try{
    const raw=await claude(sys,[...chatHistory,{role:'user',content:msg}]);
    removeMsg(loadId);

    // Try parse JSON response
    let reply=raw;
    try{
      const parsed=JSON.parse(raw.replace(/```json|```/g,'').trim());
      reply=parsed.reply||raw;
      // Apply reorder
      if(parsed.reorder?.length){
        const newPlan=[];
        parsed.reorder.forEach(id=>{ const p=S.plan.find(x=>x.id===id); if(p) newPlan.push(p); });
        // Add any not in reorder list at end
        safeS().plan.forEach(p=>{ if(!newPlan.find(x=>x.id===p.id)) newPlan.push(p); });
        S.plan=newPlan;
        renderPlan();
        reply+=' ✓ Đã sắp xếp lại thứ tự.';
      }
      // Learn preference
      if(parsed.new_preference){
        S.preferences.push(parsed.new_preference);
        if(S.preferences.length>30) S.preferences=S.preferences.slice(-30);
        reply+=' [Em đã ghi nhận sở thích này để áp dụng cho những lần sau]';
      }
      scheduleSave();
    }catch(e){ /* plain text reply, fine */ }

    addMsg('ai',reply);
    chatHistory.push({role:'user',content:msg},{role:'assistant',content:raw});
    if(chatHistory.length>24) chatHistory=chatHistory.slice(-24);
  }catch(e){ removeMsg(loadId); addMsg('ai','Lỗi: '+e.message); }
}

function renderBoard(){
  const board=document.getElementById('boardWrap');
  board.innerHTML='';
  let done=0,left=0;
  COLS.forEach(col=>{
    const tasks=S.tasks.filter(t=>t.col===col.id&&(t.status==='active'||t.status==='done'));
    done+=tasks.filter(t=>t.status==='done').length;
    left+=tasks.filter(t=>t.status==='active').length;
    const colEl=document.createElement('div'); colEl.className='col';
    colEl.innerHTML=`<div class="col-head"><div class="col-stripe" style="background:${col.color}"></div>${col.label}<span style="margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--muted)">${tasks.length}</span></div><div class="col-tasks" id="ct_${col.id}"></div>`;
    board.appendChild(colEl);
    const te=colEl.querySelector('.col-tasks');
    if(!tasks.length){te.innerHTML='<div class="empty-col">—</div>';return;}
    tasks.forEach(t=>{
      const d=t.status==='done';
      const c=document.createElement('div'); c.className='card'+(d?' done':'');
      c.innerHTML=`<div class="card-check${d?' on':''}" onclick="toggleDone('${t.id}',event)">${d?'✓':''}</div><div class="card-text">${t.text}</div>${t.deadline?`<div class="card-dl">${t.deadline}</div>`:''}${t.note?`<div class="card-note">${t.note}</div>`:''}`;
      te.appendChild(c);
    });
  });
  document.getElementById('sDone').textContent=done;
  document.getElementById('sLeft').textContent=left;
  document.getElementById('sKho').textContent=S.kho.filter(t=>t.status==='active').length;
}

function toggleDone(id,e){
  e.stopPropagation();
  const t=S.tasks.find(t=>t.id===id);
  if(t){
    t.status=t.status==='done'?'active':'done';
    // sync plan
    const pi=S.plan.findIndex(p=>p.text===t.text);
    if(pi>=0) S.plan[pi].done=(t.status==='done');
    scheduleSave(); renderBoard(); renderPlan();
  }
}

  if(getKey()){
    try{
      const s=await claude('Tổng kết ngày làm việc ngắn gọn 3-5 câu tiếng Việt theo Bullet Journal: làm được gì, chưa làm gì, nhận xét, 1 gợi ý cho ngày mai.',[{role:'user',content:buildCtx()}]);
      document.getElementById('aiSumBox').textContent=s;
      document.getElementById('aiSumBox').style.color='var(--ink)';
      addMsg('ai',s);
    }catch(e){ document.getElementById('aiSumBox').textContent='Lỗi: '+e.message; }
  }
}

function reviewAct(id,action){
  const t=S.tasks.find(t=>t.id===id); if(!t) return;
  if(action==='done') t.status='done';
  else if(action==='migrate'){ t.status='migrated'; S.kho.push({...t,id:'k'+Date.now(),migratedAt:new Date().toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit'}),status:'active'}); }
  else t.status='dropped';
  // remove from plan
  S.plan=S.plan.filter(p=>p.text!==t.text);
  scheduleSave(); renderBoard(); renderPlan(); renderKho();
  const ri=document.getElementById('ri_'+id);
  if(ri){ ri.style.opacity='.35'; ri.querySelectorAll('.rac').forEach(b=>b.disabled=true); ri.querySelector('.review-actions').innerHTML=`<span style="font-size:11px;color:var(--muted)">${{done:'✓ Xong',migrate:'→ Kho',drop:'✕ Bỏ'}[action]}</span>`; }
}

// ═══════════════════════════════════════
// KHO
// ═══════════════════════════════════════
function renderKho(){
  const active=S.kho.filter(t=>t.status==='active');
  document.getElementById('khoCount').textContent=active.length+' đầu việc';
  const el=document.getElementById('khoContent');
  if(!active.length){el.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted);font-size:13px">Kho trống 🎉</div>';return;}
  const grouped={};
  COLS.forEach(c=>{grouped[c.id]=[];});
  active.forEach(t=>{(grouped[t.col]||grouped['other']).push(t);});
  el.innerHTML='';
  COLS.forEach(col=>{
    if(!grouped[col.id]?.length) return;
    const g=document.createElement('div'); g.className='kho-group';
    g.innerHTML=`<div class="kho-group-label">${col.label}</div>${grouped[col.id].map(t=>`<div class="kho-card"><div class="kho-card-body"><div>${t.text}</div>${t.note?'<div class="kho-card-note">'+t.note+'</div>':''}</div><div class="kho-actions">${t.migratedAt?'<div class="kho-meta">từ '+t.migratedAt+'</div>':''}${t.deadline?'<div class="kho-meta" style="color:var(--blue)">📅 '+t.deadline+'</div>':''}<div style="display:flex;gap:4px"><button class="kbtn" onclick="khoToDay(\''+t.id+'\')">→ Hôm nay</button><button class="kbtn del" onclick="khoRemove(\''+t.id+'\')">✕</button></div></div></div>`).join('')}`;
    el.appendChild(g);
  });
}

function khoToDay(id){
  const i=S.kho.findIndex(t=>t.id===id); if(i<0) return;
  const t={...S.kho[i],id:'t'+Date.now(),status:'active'};
  S.tasks.push(t); S.kho.splice(i,1);
  scheduleSave(); renderBoard(); renderKho();
  addMsg('ai',`Đã kéo "${t.text}" vào bảng hôm nay.`);
}
function khoRemove(id){
  if(!confirm('Bỏ việc này khỏi Kho?')) return;
  S.kho=S.kho.filter(t=>t.id!==id);
  scheduleSave(); renderKho();
}

// ═══════════════════════════════════════
// MODE
// ═══════════════════════════════════════
function setMode(mode){
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+mode)?.classList.add('active');
  document.getElementById('modeBadge').textContent={brief:'Buổi sáng',daily:'Trong ngày',review:'Tổng kết',kho:'Kho việc'}[mode]||'';
  ['brief','daily','review','kho'].forEach(v=>{
    const el=document.getElementById('view-'+v); if(!el) return;
    el.style.display=v===mode?(v==='brief'?'flex':'flex'):'none';
    if(v!=='brief') el.style.flexDirection=v==='daily'?'column':'column';
  });
  if(mode==='review') buildReview();
  if(mode==='kho') renderKho();
}

// ═══════════════════════════════════════
// CHAT HELPERS
// ═══════════════════════════════════════
let lc=0;
function renderMd(text){
  var s = (text||'').replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  s = s.replace(/\n/g,"<br>");
  return s;
}
function addMsg(role,text){
  const el=document.createElement('div'); el.className='msg '+role;
  if(role==='ai') el.innerHTML=renderMd(text);
  else el.textContent=text;
  const msgs=document.getElementById('chatMsgs');
  msgs.appendChild(el); msgs.scrollTop=msgs.scrollHeight; return el;
}
function addLoading(){
  const id='ld'+(++lc);
  const el=document.createElement('div'); el.className='msg ai'; el.id=id;
  el.innerHTML='<span class="loading-dot">●</span><span class="loading-dot">●</span><span class="loading-dot">●</span>';
  const msgs=document.getElementById('chatMsgs');
  msgs.appendChild(el); msgs.scrollTop=msgs.scrollHeight; return id;
}
function removeMsg(id){ document.getElementById(id)?.remove(); }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
function renderAll(){ renderBoard(); renderKho(); renderPlan(); }

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
function init(){
  document.getElementById('dateChip').textContent=new Date().toLocaleDateString('vi-VN',{weekday:'short',day:'2-digit',month:'2-digit'});
  const savedKey=LS.loadApi();
  if(savedKey) document.getElementById('apiInput').value=savedKey;
  LS.load(); renderAll();
  const savedToken=LS.loadToken();
  if(savedToken){ driveToken=savedToken; setDriveUI(true); driveInit().catch(()=>{ driveToken=null; setDriveUI(false); setSyncTxt('Token hết hạn — đăng nhập lại'); }); }
  // Fix display for views
  ['daily','review','kho'].forEach(v=>{ const el=document.getElementById('view-'+v); if(el) el.style.display='none'; });
  morningBrief();
}

window.addEventListener('load',init);
</script>
</body>
</html>
