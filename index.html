<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thu Ky · Luan</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#f5f0e8;--ink:#1a1814;--paper:#fdfaf4;--border:#ddd8cc;
  --orange:#ec872b;--green:#2d7d5f;--red:#c0392b;--blue:#2c5f8a;
  --muted:#8a8478;--surface:#eee9df;--warm:#f0e8d8;
  --font:'DM Sans',sans-serif;--serif:'Instrument Serif',serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;}
.topbar{display:flex;align-items:center;gap:10px;padding:8px 16px;background:var(--paper);border-bottom:1px solid var(--border);}
.logo{font-family:var(--serif);font-size:18px;display:flex;align-items:center;gap:7px;flex-shrink:0;}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--orange);}
.topbar-mid{flex:1;}
.date-chip{font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--surface);padding:3px 9px;border-radius:20px;}
.api-wrap{display:flex;align-items:center;gap:5px;}
.api-label{font-size:11px;color:var(--muted);}
.api-input{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--ink);font-family:var(--mono);font-size:11px;padding:4px 8px;width:140px;outline:none;}
.api-input:focus{border-color:var(--orange);}
.drive-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:11px;font-family:var(--font);transition:all .2s;white-space:nowrap;}
.drive-btn:hover{border-color:var(--orange);}
.drive-btn.connected{border-color:var(--green);color:var(--green);}
.drive-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);}
.drive-dot.on{background:var(--green);}
.sync-txt{font-size:10px;font-family:var(--mono);color:var(--muted);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.modes{display:flex;border-bottom:1px solid var(--border);background:var(--paper);}
.mode-btn{padding:9px 16px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.04em;text-transform:uppercase;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font);}
.mode-btn.active{color:var(--orange);border-bottom-color:var(--orange);}
.mode-btn:hover:not(.active){color:var(--ink);}
.layout{display:flex;flex:1;overflow:hidden;height:calc(100vh - 91px);}
.chat-panel{width:320px;min-width:320px;display:flex;flex-direction:column;border-right:1px solid var(--border);background:var(--paper);}
.chat-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.chat-title{font-size:13px;font-weight:600;}
.mode-badge{font-size:10px;padding:2px 7px;border-radius:10px;font-family:var(--mono);background:var(--surface);color:var(--muted);}
.chat-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:9px;}
.msg{padding:9px 12px;border-radius:12px;font-size:13px;line-height:1.6;word-break:break-word;}
.msg.ai{background:var(--warm);border:1px solid var(--border);align-self:flex-start;max-width:95%;border-bottom-left-radius:3px;}
.msg.user{background:var(--orange);color:#fff;align-self:flex-end;max-width:88%;border-bottom-right-radius:3px;white-space:pre-wrap;}
.chat-foot{padding:10px 12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:7px;}
.quick-btns{display:flex;gap:5px;flex-wrap:wrap;}
.qbtn{font-size:11px;padding:3px 9px;border-radius:14px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;font-family:var(--font);}
.qbtn:hover{border-color:var(--orange);color:var(--orange);}
.chat-row{display:flex;gap:6px;}
.chat-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--ink);font-family:var(--font);font-size:13px;padding:8px 11px;outline:none;resize:none;min-height:36px;max-height:90px;}
.chat-input:focus{border-color:var(--orange);}
.send-btn{background:var(--orange);border:none;border-radius:8px;color:#fff;width:36px;cursor:pointer;font-size:17px;flex-shrink:0;}
.right-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.brief-outer{flex:1;display:flex;overflow:hidden;}
.brief-left{width:300px;min-width:300px;border-right:1px solid var(--border);overflow-y:auto;padding:18px 16px;display:flex;flex-direction:column;gap:12px;}
.brief-greeting{font-family:var(--serif);font-size:22px;line-height:1.3;}
.brief-sub{color:var(--muted);font-size:13px;line-height:1.6;}
.brief-section h3{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:7px;}
.brief-card{background:var(--paper);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:12.5px;line-height:1.5;display:flex;gap:9px;margin-bottom:5px;}
.bc-dot{width:7px;height:7px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.bc-body{flex:1;}
.bc-reason{font-size:11px;color:var(--muted);margin-top:2px;}
.bc-impact{font-size:11px;color:var(--red);margin-top:2px;}
.bc-badge{font-size:10px;font-family:var(--mono);padding:1px 6px;border-radius:8px;background:#eef4fb;color:var(--blue);display:inline-block;margin-top:3px;}
.btn-start{width:100%;background:var(--orange);color:#fff;border:none;border-radius:8px;padding:11px;font-family:var(--font);font-weight:600;font-size:13px;cursor:pointer;margin-top:4px;}
.plan-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.plan-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--paper);}
.plan-title{font-size:13px;font-weight:600;}
.plan-hint{font-size:11px;color:var(--muted);}
.plan-list{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:4px;}
.plan-item{display:flex;align-items:flex-start;gap:10px;padding:10px;border-radius:8px;cursor:grab;border:1px solid transparent;background:var(--paper);margin-bottom:2px;}
.plan-item:hover{background:var(--warm);border-color:var(--border);}
.plan-item.dragging{opacity:.4;}
.plan-item.drag-over{border-color:var(--orange);background:var(--warm);}
.plan-num{font-family:var(--mono);font-size:11px;color:var(--muted);width:20px;flex-shrink:0;padding-top:2px;}
.plan-grip{color:var(--border);font-size:14px;flex-shrink:0;padding-top:1px;cursor:grab;}
.plan-body{flex:1;}
.plan-text{font-size:13px;line-height:1.5;}
.plan-text.done-text{text-decoration:line-through;opacity:.4;}
.plan-meta{display:flex;gap:6px;margin-top:3px;flex-wrap:wrap;}
.plan-tag{font-size:10px;font-family:var(--mono);padding:1px 6px;border-radius:6px;}
.plan-why{font-size:11px;color:var(--muted);margin-top:2px;}
.plan-check{width:18px;height:18px;border:1.5px solid var(--border);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;margin-top:2px;}
.plan-check.on{background:var(--green);border-color:var(--green);color:#fff;}
.plan-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);text-align:center;padding:40px;gap:10px;font-size:13px;}
.plan-empty-icon{font-size:36px;opacity:.35;}
.add-bar{padding:9px 13px;border-bottom:1px solid var(--border);display:flex;gap:7px;background:var(--paper);}
.add-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--ink);font-family:var(--font);font-size:13px;padding:8px 11px;outline:none;}
.add-input:focus{border-color:var(--orange);}
.add-btn{background:var(--ink);color:var(--bg);border:none;border-radius:8px;padding:8px 13px;font-family:var(--font);font-weight:500;font-size:13px;cursor:pointer;}
.stats-bar{display:flex;align-items:center;justify-content:space-between;padding:7px 13px;border-bottom:1px solid var(--border);background:var(--paper);}
.stats-left{display:flex;gap:12px;}
.stat{font-size:12px;color:var(--muted);font-family:var(--mono);}
.stat span{color:var(--ink);font-weight:500;}
.btn-eod{background:var(--ink);color:var(--bg);border:none;border-radius:6px;padding:5px 11px;font-size:12px;font-family:var(--font);cursor:pointer;}
.board-wrap{flex:1;overflow-x:auto;overflow-y:hidden;display:flex;}
.col{min-width:190px;max-width:190px;display:flex;flex-direction:column;border-right:1px solid var(--border);}
.col-head{padding:10px 12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border);background:var(--paper);}
.col-stripe{width:3px;height:12px;border-radius:2px;flex-shrink:0;}
.col-tasks{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px;}
.card{background:var(--paper);border:1px solid var(--border);border-radius:8px;padding:9px 10px;font-size:12px;line-height:1.5;position:relative;}
.card:hover{border-color:var(--orange);}
.card.done{opacity:.35;}
.card.done .card-text{text-decoration:line-through;}
.card-text{padding-right:22px;}
.card-dl{font-size:10px;font-family:var(--mono);color:var(--blue);margin-top:3px;}
.card-note{font-size:10px;color:var(--muted);margin-top:2px;}
.card-check{position:absolute;top:7px;right:7px;width:16px;height:16px;border:1.5px solid var(--border);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;}
.card-check.on{background:var(--green);border-color:var(--green);color:#fff;}
.empty-col{font-size:11px;color:var(--border);text-align:center;padding:12px 6px;}
.review-outer{flex:1;overflow-y:auto;}
.review-wrap{padding:18px;display:flex;flex-direction:column;gap:13px;}
.review-title{font-family:var(--serif);font-size:22px;}
.review-section{background:var(--paper);border:1px solid var(--border);border-radius:10px;padding:13px 15px;}
.review-section h3{font-size:12px;font-weight:600;margin-bottom:10px;}
.review-item{display:flex;align-items:flex-start;gap:9px;padding:7px 9px;border-radius:7px;background:var(--surface);font-size:13px;margin-bottom:6px;}
.review-item-text{flex:1;line-height:1.5;}
.review-actions{display:flex;gap:4px;flex-shrink:0;}
.rac{font-size:11px;padding:3px 8px;border-radius:5px;border:1px solid var(--border);cursor:pointer;font-family:var(--font);background:var(--paper);}
.rac.done2{border-color:var(--green);color:var(--green);}
.rac.migrate{border-color:var(--blue);color:var(--blue);}
.rac.drop{border-color:var(--red);color:var(--red);}
.rac:disabled{opacity:.35;cursor:default;}
.kho-outer{flex:1;overflow-y:auto;}
.kho-wrap{padding:18px;}
.kho-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.kho-title{font-family:var(--serif);font-size:22px;}
.kho-count{font-family:var(--mono);font-size:12px;color:var(--muted);}
.kho-group{margin-bottom:16px;}
.kho-group-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:7px;}
.kho-card{background:var(--paper);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:5px;}
.kho-card-body{flex:1;}
.kho-card-note{font-size:11px;color:var(--muted);margin-top:2px;}
.kho-meta{font-size:10px;color:var(--muted);font-family:var(--mono);}
.kho-actions{display:flex;gap:4px;flex-direction:column;align-items:flex-end;}
.kbtn{font-size:10px;padding:3px 7px;border-radius:5px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-family:var(--font);white-space:nowrap;}
.kbtn:hover{border-color:var(--orange);color:var(--orange);}
.kbtn.del:hover{border-color:var(--red);color:var(--red);}
.ld{animation:blink 1.2s infinite;display:inline-block;}
.ld:nth-child(2){animation-delay:.2s;}
.ld:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.toast{position:fixed;bottom:18px;right:18px;background:var(--ink);color:var(--bg);padding:9px 15px;border-radius:8px;font-size:12px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><div class="logo-dot"></div>Thu Ky</div>
  <div class="topbar-mid"></div>
  <div class="date-chip" id="dateChip"></div>
  <div class="api-wrap">
    <span class="api-label">Claude</span>
    <input class="api-input" id="apiInput" type="password" placeholder="sk-ant-..." oninput="LS.saveApi(this.value)">
  </div>
  <button class="drive-btn" id="driveBtn" onclick="handleDriveAuth()">
    <div class="drive-dot" id="driveDot"></div>
    <span id="driveBtnTxt">Ket noi Drive</span>
  </button>
  <span class="sync-txt" id="syncTxt"></span>
</div>

<div class="modes">
  <button class="mode-btn active" id="tab-brief" onclick="setMode('brief')">&#9728; Sang</button>
  <button class="mode-btn" id="tab-daily" onclick="setMode('daily')">&#128203; Hom nay</button>
  <button class="mode-btn" id="tab-review" onclick="setMode('review')">&#127769; Tong ket</button>
  <button class="mode-btn" id="tab-kho" onclick="setMode('kho')">&#128452; Kho viec</button>
</div>

<div class="layout">
  <div class="chat-panel">
    <div class="chat-header">
      <div class="chat-title">Thu ky AI</div>
      <div class="mode-badge" id="modeBadge">Buoi sang</div>
    </div>
    <div class="chat-msgs" id="chatMsgs"></div>
    <div class="chat-foot">
      <div class="quick-btns">
        <button class="qbtn" onclick="quickSend('Gio nay anh lam gi duoc?')">Lam gi gio?</button>
        <button class="qbtn" onclick="quickSend('Stress qua, viec nao quan trong nhat?')">Stress oi</button>
        <button class="qbtn" onclick="quickSend('Sap xep lai thu tu cho anh')">Sap xep lai</button>
        <button class="qbtn" onclick="quickSend('Tong quan hom nay the nao?')">Overview</button>
      </div>
      <div class="chat-row">
        <textarea class="chat-input" id="chatInput" placeholder="Nhan gi cung duoc..." rows="1"
          onkeydown="onChatKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" onclick="sendChat()">&#8593;</button>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <div id="view-brief" style="display:flex;flex:1;overflow:hidden;" class="brief-outer">
      <div class="brief-left" id="briefLeft">
        <div class="brief-greeting" id="briefGreeting">Chao buoi sang, Luan.</div>
        <div class="brief-sub" id="briefSub">Dang chuan bi brief...</div>
        <div id="briefSections"></div>
      </div>
      <div class="plan-panel">
        <div class="plan-header">
          <div class="plan-title">&#128203; Thu tu lam viec hom nay</div>
          <div class="plan-hint">Keo tha doi thu tu · Chat de dieu chinh</div>
        </div>
        <div class="plan-list" id="planList">
          <div class="plan-empty">
            <div class="plan-empty-icon">&#9728;</div>
            <div>Doi thu ky brief xong se tu dong tao lich ngay</div>
          </div>
        </div>
      </div>
    </div>

    <div id="view-daily" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
      <div class="add-bar">
        <input class="add-input" id="addInput" placeholder="Nhap viec moi - tho cung duoc, thu ky phan tich..." onkeydown="if(event.key==='Enter')addTask()">
        <button class="add-btn" onclick="addTask()">+ Them</button>
      </div>
      <div class="stats-bar">
        <div class="stats-left">
          <div class="stat">Xong: <span id="sDone">0</span></div>
          <div class="stat">Con: <span id="sLeft">0</span></div>
          <div class="stat">Kho: <span id="sKho">0</span></div>
        </div>
        <button class="btn-eod" onclick="setMode('review')">Tong ket ngay</button>
      </div>
      <div class="board-wrap" id="boardWrap"></div>
    </div>

    <div id="view-review" class="review-outer" style="display:none;">
      <div class="review-wrap" id="reviewContent"></div>
    </div>

    <div id="view-kho" class="kho-outer" style="display:none;">
      <div class="kho-wrap">
        <div class="kho-header">
          <div class="kho-title">Kho viec</div>
          <div class="kho-count" id="khoCount">0 dau viec</div>
        </div>
        <div id="khoContent"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var GOOGLE_CLIENT_ID = '356592007545-e6poq5irp699hj93vfvkqjl7uh5mdggm.apps.googleusercontent.com';
var FOLDER_NAME = 'Thu Ky AI';
var FILE_NAME = 'secretary_data.json';

var S = { tasks:[], kho:[], plan:[], preferences:[] };
var chatHistory = [];
var driveToken = null, driveFolderId = null, driveFileId = null;
var syncTimer = null, dragSrc = null;

var COLS = [
  {id:'urgent',    label:'Gap hom nay',       color:'#c0392b'},
  {id:'today',     label:'Quan trong hom nay', color:'#ec872b'},
  {id:'presence',  label:'Can co mat',         color:'#2c5f8a'},
  {id:'important', label:'Quan trong',         color:'#b8860b'},
  {id:'should',    label:'Nen lam',            color:'#2d7d5f'},
  {id:'want',      label:'Muon lam',           color:'#6b4c9a'},
  {id:'other',     label:'Khac',               color:'#8a8478'}
];

// ── SAFE STATE ──
function gs() {
  S.tasks = S.tasks || [];
  S.kho = S.kho || [];
  S.plan = S.plan || [];
  S.preferences = S.preferences || [];
  return S;
}

// ── LOCAL STORAGE ──
var LS = {
  saveApi: function(v){ try{ localStorage.setItem('tk_api', v); }catch(e){} },
  loadApi: function(){ try{ return localStorage.getItem('tk_api') || ''; }catch(e){ return ''; } },
  saveToken: function(t){ try{ localStorage.setItem('tk_gt', t || ''); }catch(e){} },
  loadToken: function(){ try{ return localStorage.getItem('tk_gt') || null; }catch(e){ return null; } },
  save: function(){ try{ localStorage.setItem('tk_data', JSON.stringify(gs())); }catch(e){} },
  load: function(){
    try{
      var d = localStorage.getItem('tk_data');
      if(d){ S = JSON.parse(d); gs(); }
    }catch(e){}
  }
};

// ── GOOGLE DRIVE ──
function handleDriveAuth() {
  if(driveToken){ driveDisconnect(); return; }
  var client = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: 'https://www.googleapis.com/auth/drive.file',
    callback: function(resp) {
      if(resp.error){ showToast('Loi dang nhap Google'); return; }
      driveToken = resp.access_token;
      LS.saveToken(driveToken);
      setDriveUI(true);
      showToast('Da ket noi Google Drive');
      driveInit();
    }
  });
  client.requestAccessToken();
}

function driveDisconnect() {
  driveToken = null; driveFolderId = null; driveFileId = null;
  LS.saveToken(''); setDriveUI(false); showToast('Da ngat Drive');
}

function setDriveUI(on) {
  document.getElementById('driveDot').className = 'drive-dot' + (on ? ' on' : '');
  document.getElementById('driveBtnTxt').textContent = on ? 'Drive v' : 'Ket noi Drive';
  document.getElementById('driveBtn').className = 'drive-btn' + (on ? ' connected' : '');
}

async function driveReq(url, opts) {
  opts = opts || {};
  var headers = { 'Authorization': 'Bearer ' + driveToken, 'Content-Type': 'application/json' };
  if(opts.headers) Object.assign(headers, opts.headers);
  var res = await fetch(url, { method: opts.method || 'GET', headers: headers, body: opts.body });
  return res.json();
}

async function driveInit() {
  try {
    setSyncTxt('Dang ket noi...');
    var res = await driveReq("https://www.googleapis.com/drive/v3/files?q=name='" + FOLDER_NAME + "' and mimeType='application/vnd.google-apps.folder' and trashed=false&fields=files(id)");
    if(res.files && res.files.length) {
      driveFolderId = res.files[0].id;
    } else {
      var f = await driveReq('https://www.googleapis.com/drive/v3/files', { method:'POST', body: JSON.stringify({name: FOLDER_NAME, mimeType:'application/vnd.google-apps.folder'}) });
      driveFolderId = f.id;
    }
    res = await driveReq("https://www.googleapis.com/drive/v3/files?q=name='" + FILE_NAME + "' and '" + driveFolderId + "' in parents and trashed=false&fields=files(id)");
    if(res.files && res.files.length) {
      driveFileId = res.files[0].id;
      await driveLoad();
    } else {
      await driveSave();
    }
    renderAll();
    setSyncTxt('Drive dong bo');
  } catch(e) {
    setSyncTxt('Drive loi');
  }
}

async function driveLoad() {

// ── CLAUDE API ──
function getKey() { return (document.getElementById('apiInput').value || '').trim(); }

async function callClaude(system, messages, wantJson) {
  var key = getKey();
  if(!key) throw new Error('Chua co API key');
  var res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({ model:'claude-sonnet-4-6', max_tokens:2000, system:system, messages:messages })
  });
  if(!res.ok) {
    var e = await res.json().catch(function(){ return {}; });
    throw new Error((e.error && e.error.message) || 'HTTP ' + res.status);
  }
  var d = await res.json();
  var text = (d.content && d.content[0] && d.content[0].text) || '';
  if(wantJson) {
    try { return JSON.parse(text.replace(/```json|```/g,'').trim()); }
    catch(e) { throw new Error('Khong parse duoc JSON'); }
  }
  return text;
}

function buildCtx() {
  var now = new Date();
  var h = now.getHours();
  var tod = h < 12 ? 'buoi sang' : h < 18 ? 'buoi chieu' : 'buoi toi';
  var taskLines = gs().tasks.map(function(t) {
    return '[' + t.col + '|' + t.status + '] ' + t.text + (t.deadline ? ' deadline:' + t.deadline : '') + (t.note ? ' - ' + t.note : '');
  }).join('\n') || '(chua co)';
  var planLines = gs().plan.map(function(p, i) {
    return (i+1) + '. [' + (p.timeBlock||'anytime') + '|' + (p.done?'xong':'con') + '] ' + p.text;
  }).join('\n') || '(chua co)';
  var khoLines = gs().kho.filter(function(t){ return t.status==='active'; }).map(function(t) {
    return '[' + t.col + '] ' + t.text + (t.deadline ? ' ' + t.deadline : '');
  }).join('\n') || '(rong)';
  var prefLines = gs().preferences.slice(-10).join('\n') || '(chua co)';
  return 'Ngay: ' + now.toLocaleDateString('vi-VN', {weekday:'long', day:'2-digit', month:'2-digit', year:'numeric'}) + ' - ' + tod + '\n' +
    'Anh Luan: chu Lantern Travel (inbound mien Bac VN) va Lumi A Dong Travel (outbound Nhat/Trung/Han). Lam theo Bullet Journal.\n\n' +
    'CONG VIEC HOM NAY:\n' + taskLines + '\n\n' +
    'KE HOACH NGAY:\n' + planLines + '\n\n' +
    'KHO VIEC:\n' + khoLines + '\n\n' +
    'SO THICH SAP XEP:\n' + prefLines;
}

// ── PLAN RENDER + DRAG DROP ──
function renderPlan() {
  var list = document.getElementById('planList');
  gs();
  if(!S.plan.length) {
    list.innerHTML = '<div class="plan-empty"><div class="plan-empty-icon">&#9728;</div><div>Doi thu ky brief xong se tu dong tao lich ngay</div></div>';
    return;
  }
  list.innerHTML = '';
  S.plan.forEach(function(p, i) {
    var eColor = p.energy==='high' ? '#c0392b' : p.energy==='mid' ? '#ec872b' : '#2d7d5f';
    var tbLabel = p.timeBlock==='morning' ? 'Sang' : p.timeBlock==='afternoon' ? 'Chieu' : p.timeBlock==='evening' ? 'Toi' : '';
    var el = document.createElement('div');
    el.className = 'plan-item';
    el.draggable = true;
    el.dataset.idx = i;
    el.innerHTML =
      '<div class="plan-num">' + (i+1) + '</div>' +
      '<div class="plan-grip">&#8942;</div>' +
      '<div class="plan-body">' +
        '<div class="plan-text' + (p.done ? ' done-text' : '') + '">' + esc(p.text) + '</div>' +
        '<div class="plan-meta">' +
          (tbLabel ? '<span class="plan-tag" style="background:#f0e8d8;color:var(--muted)">' + tbLabel + '</span>' : '') +
          '<span class="plan-tag" style="background:' + eColor + '18;color:' + eColor + '">' + (p.energy==='high'?'Cao':p.energy==='mid'?'Vua':'Nhe') + '</span>' +
        '</div>' +
        (p.why ? '<div class="plan-why">' + esc(p.why) + '</div>' : '') +
      '</div>' +
      '<div class="plan-check' + (p.done ? ' on' : '') + '" onclick="togglePlanDone(' + i + ',event)">' + (p.done ? '&#10003;' : '') + '</div>';
    el.addEventListener('dragstart', function(e) { dragSrc = i; el.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
    el.addEventListener('dragend', function() { el.classList.remove('dragging'); document.querySelectorAll('.plan-item').forEach(function(x){ x.classList.remove('drag-over'); }); });
    el.addEventListener('dragover', function(e) { e.preventDefault(); el.classList.add('drag-over'); });
    el.addEventListener('dragleave', function() { el.classList.remove('drag-over'); });
    el.addEventListener('drop', function(e) {
      e.preventDefault(); el.classList.remove('drag-over');
      if(dragSrc === null || dragSrc === i) return;
      var moved = S.plan.splice(dragSrc, 1)[0];
      S.plan.splice(i, 0, moved);
      dragSrc = null; scheduleSave(); renderPlan(); showToast('Da doi thu tu');
    });
    list.appendChild(el);
  });
}

function togglePlanDone(i, e) {
  e.stopPropagation();
  gs();
  if(S.plan[i]) { S.plan[i].done = !S.plan[i].done; }
  scheduleSave(); renderPlan();
  var pt = S.plan[i] ? S.plan[i].text : null;
  if(pt) {
    var t = S.tasks.find(function(x){ return x.text === pt; });
    if(t) { t.status = S.plan[i].done ? 'done' : 'active'; renderBoard(); }
  }
}

// ── CHAT ──
async function sendChat() {
  var inp = document.getElementById('chatInput');
  var msg = inp.value.trim();
  if(!msg) return;
  inp.value = ''; autoResize(inp);
  if(!getKey()) { addMsg('ai','Anh nhap API key truoc nhe!'); return; }
  addMsg('user', msg);
  var lid = addLoading();
  var sys = 'Ban la thu ky AI cua anh Luan. Tra loi ngan gon, thuc te, tieng Viet.\n' +
    'Khi anh hoi "lam gi gio" -> goi y 2-3 viec phu hop thoi diem.\n' +
    'Khi anh stress -> chon 3 viec KEY nhat co impact lon nhat neu bo qua.\n' +
    'Khi anh muon sap xep lai -> tra ve JSON: {"reply":"...","reorder":["id1","id2",...],"new_pref":"so thich moi hoac null"}\n' +
    'Neu chi chat thuong -> tra ve text binh thuong.\n\n' + buildCtx();
  try {
    var raw = await callClaude(sys, chatHistory.concat([{role:'user', content:msg}]), false);
    removeMsg(lid);
    var reply = raw;
    try {
      var parsed = JSON.parse(raw.replace(/```json|```/g,'').trim());
      reply = parsed.reply || raw;
      if(parsed.reorder && parsed.reorder.length) {
        var newPlan = [];
        parsed.reorder.forEach(function(id){ var p = gs().plan.find(function(x){ return x.id===id; }); if(p) newPlan.push(p); });
        gs().plan.forEach(function(p){ if(!newPlan.find(function(x){ return x.id===p.id; })) newPlan.push(p); });
        S.plan = newPlan; renderPlan();
      }
      if(parsed.new_pref) {
        gs().preferences.push(parsed.new_pref);
        if(S.preferences.length > 30) S.preferences = S.preferences.slice(-30);
      }
      scheduleSave();
    } catch(e) { /* plain text */ }
    addMsg('ai', reply);
    chatHistory.push({role:'user', content:msg}, {role:'assistant', content:raw});
    if(chatHistory.length > 24) chatHistory = chatHistory.slice(-24);
  } catch(e) { removeMsg(lid); addMsg('ai', 'Loi: ' + e.message); }
}

function quickSend(t) { document.getElementById('chatInput').value = t; sendChat(); }
function onChatKey(e) { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendChat(); } }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,90)+'px'; }

// ── BOARD ──
function renderBoard() {
  var board = document.getElementById('boardWrap');
  board.innerHTML = '';
  var done = 0, left = 0;
  gs();
  COLS.forEach(function(col) {
    var tasks = S.tasks.filter(function(t){ return t.col===col.id && (t.status==='active'||t.status==='done'); });
    done += tasks.filter(function(t){ return t.status==='done'; }).length;
    left += tasks.filter(function(t){ return t.status==='active'; }).length;
    var colEl = document.createElement('div'); colEl.className = 'col';
    colEl.innerHTML = '<div class="col-head"><div class="col-stripe" style="background:'+col.color+'"></div>'+col.label+'<span style="margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--muted)">'+tasks.length+'</span></div><div class="col-tasks" id="ct_'+col.id+'"></div>';
    board.appendChild(colEl);
    var te = colEl.querySelector('.col-tasks');
    if(!tasks.length){ te.innerHTML = '<div class="empty-col">-</div>'; return; }
    tasks.forEach(function(t) {
      var d = t.status==='done';
      var c = document.createElement('div'); c.className = 'card' + (d?' done':'');
      c.innerHTML = '<div class="card-check' + (d?' on':'') + '" onclick="toggleDone(\''+t.id+'\',event)">'+(d?'&#10003;':'')+'</div><div class="card-text">'+esc(t.text)+'</div>'+(t.deadline?'<div class="card-dl">'+esc(t.deadline)+'</div>':'')+(t.note?'<div class="card-note">'+esc(t.note)+'</div>':'');
      te.appendChild(c);
    });
  });
  document.getElementById('sDone').textContent = done;
  document.getElementById('sLeft').textContent = left;
  document.getElementById('sKho').textContent = gs().kho.filter(function(t){ return t.status==='active'; }).length;
}

function toggleDone(id, e) {
  e.stopPropagation();
  gs();
  var t = S.tasks.find(function(x){ return x.id===id; });
  if(t) {
    t.status = t.status==='done' ? 'active' : 'done';
    var pi = S.plan.findIndex(function(p){ return p.text===t.text; });
    if(pi >= 0) S.plan[pi].done = (t.status==='done');
    scheduleSave(); renderBoard(); renderPlan();
  }
}

function reviewAct(id, action) {
  gs();
  var t = S.tasks.find(function(x){ return x.id===id; });
  if(!t) return;
  if(action==='done') t.status = 'done';
  else if(action==='migrate') { t.status = 'migrated'; S.kho.push(Object.assign({}, t, {id:'k'+Date.now(), migratedAt:new Date().toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit'}), status:'active'})); }
  else t.status = 'dropped';
  S.plan = S.plan.filter(function(p){ return p.text !== t.text; });
  scheduleSave(); renderBoard(); renderPlan(); renderKho();
  var ri = document.getElementById('ri_' + id);
  if(ri) {
    ri.style.opacity = '.35';
    ri.querySelectorAll('.rac').forEach(function(b){ b.disabled = true; });
    ri.querySelector('.review-actions').innerHTML = '<span style="font-size:11px;color:var(--muted)">' + {done:'Xong', migrate:'Vao Kho', drop:'Bo'}[action] + '</span>';
  }
}

// ── KHO ──
function renderKho() {

function khoToDay(id) {
  gs();
  var i = S.kho.findIndex(function(t){ return t.id===id; });
  if(i < 0) return;
  var t = Object.assign({}, S.kho[i], {id:'t'+Date.now(), status:'active'});

  scheduleSave(); renderBoard(); renderKho();
  addMsg('ai', 'Da keo "' + t.text + '" vao bang hom nay.');

function khoRemove(id) {
  if(!confirm('Bo viec nay khoi Kho?')) return;

// ── MODE ──
function setMode(mode) {
  document.querySelectorAll('.mode-btn').forEach(function(b){ b.classList.remove('active'); });
  var tabEl = document.getElementById('tab-' + mode);
  if(tabEl) tabEl.classList.add('active');
  var badges = {brief:'Buoi sang', daily:'Trong ngay', review:'Tong ket', kho:'Kho viec'};
  document.getElementById('modeBadge').textContent = badges[mode] || '';
  var views = ['brief','daily','review','kho'];
  views.forEach(function(v) {
    var el = document.getElementById('view-' + v);
    if(!el) return;
    if(v === mode) { el.style.display = (v==='brief') ? 'flex' : 'flex'; el.style.flexDirection = (v==='daily'||v==='brief') ? '' : 'column'; }
    else { el.style.display = 'none'; }
  });
  if(mode==='review') buildReview();
  if(mode==='kho') renderKho();
}

// ── CHAT HELPERS ──
var lc = 0;
function addMsg(role, text) {
  var el = document.createElement('div');
  el.className = 'msg ' + role;
  el.textContent = text;
  var msgs = document.getElementById('chatMsgs');
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
  return el;
}
function addLoading() {
  var id = 'ld' + (++lc);
  var el = document.createElement('div');
  el.className = 'msg ai'; el.id = id;
  el.innerHTML = '<span class="ld">&#9679;</span><span class="ld">&#9679;</span><span class="ld">&#9679;</span>';
  document.getElementById('chatMsgs').appendChild(el);
  document.getElementById('chatMsgs').scrollTop = 99999;
  return id;
}
function removeMsg(id) { var el = document.getElementById(id); if(el) el.remove(); }
function showToast(msg) { var t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); }, 2500); }
function renderAll() { renderBoard(); renderKho(); renderPlan(); }

// ── INIT ──
function init() {
  document.getElementById('dateChip').textContent = new Date().toLocaleDateString('vi-VN', {weekday:'short', day:'2-digit', month:'2-digit'});
  var savedKey = LS.loadApi();
  if(savedKey) document.getElementById('apiInput').value = savedKey;
  LS.load(); renderAll();
  var savedToken = LS.loadToken();
  if(savedToken) {
    driveToken = savedToken; setDriveUI(true);
    driveInit().catch(function(){ driveToken=null; setDriveUI(false); setSyncTxt('Token het han - dang nhap lai'); });
  }
  ['daily','review','kho'].forEach(function(v){ var el=document.getElementById('view-'+v); if(el) el.style.display='none'; });
  morningBrief();
}

window.addEventListener('load', init);
</script>
