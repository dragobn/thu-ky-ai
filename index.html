<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thư Ký · Luan</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#f5f0e8;--ink:#1a1814;--paper:#fdfaf4;--border:#ddd8cc;
  --orange:#ec872b;--green:#2d7d5f;--red:#c0392b;--blue:#2c5f8a;
  --muted:#8a8478;--surface:#eee9df;--warm:#f0e8d8;
  --font:'DM Sans',sans-serif;--serif:'Instrument Serif',serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;}

/* TOP BAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--paper);border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px;}
.logo{font-family:var(--serif);font-size:20px;display:flex;align-items:center;gap:8px;}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--orange);}
.topbar-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.date-chip{font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--surface);padding:4px 10px;border-radius:20px;}
.api-wrap{display:flex;align-items:center;gap:6px;}
.api-label{font-size:11px;color:var(--muted);}
.api-input{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--ink);font-family:var(--mono);font-size:11px;padding:5px 8px;width:160px;outline:none;}
.api-input:focus{border-color:var(--orange);}
.drive-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:12px;font-family:var(--font);transition:all .2s;}
.drive-btn:hover{border-color:var(--orange);}
.drive-btn.connected{border-color:var(--green);color:var(--green);}
.drive-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);}
.drive-dot.on{background:var(--green);}
.sync-status{font-size:11px;font-family:var(--mono);color:var(--muted);}

/* MODES */
.modes{display:flex;border-bottom:1px solid var(--border);background:var(--paper);}
.mode-btn{padding:10px 18px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.05em;text-transform:uppercase;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font);}
.mode-btn.active{color:var(--orange);border-bottom-color:var(--orange);}
.mode-btn:hover:not(.active){color:var(--ink);}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden;height:calc(100vh - 97px);}

/* CHAT PANEL */
.chat-panel{width:340px;min-width:340px;display:flex;flex-direction:column;border-right:1px solid var(--border);background:var(--paper);}
.chat-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.chat-title{font-size:13px;font-weight:600;}
.mode-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-family:var(--mono);background:var(--surface);color:var(--muted);}
.chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}
.msg{padding:10px 13px;border-radius:12px;font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word;}
.msg.ai{background:var(--warm);border:1px solid var(--border);align-self:flex-start;max-width:95%;border-bottom-left-radius:3px;}
.msg.user{background:var(--orange);color:#fff;align-self:flex-end;max-width:88%;border-bottom-right-radius:3px;}
.msg.sys{background:var(--surface);color:var(--muted);font-size:11px;align-self:center;text-align:center;border-radius:8px;padding:5px 12px;font-family:var(--mono);}
.chat-input-wrap{padding:10px 12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:7px;}
.quick-btns{display:flex;gap:5px;flex-wrap:wrap;}
.qbtn{font-size:11px;padding:4px 9px;border-radius:14px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .15s;font-family:var(--font);}
.qbtn:hover{border-color:var(--orange);color:var(--orange);}
.chat-row{display:flex;gap:6px;}
.chat-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--ink);font-family:var(--font);font-size:13px;padding:8px 11px;outline:none;resize:none;min-height:36px;max-height:90px;}
.chat-input:focus{border-color:var(--orange);}
.send-btn{background:var(--orange);border:none;border-radius:8px;color:#fff;width:36px;cursor:pointer;font-size:17px;transition:opacity .2s;flex-shrink:0;}
.send-btn:hover{opacity:.85;}

/* RIGHT PANEL */
.right-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* BRIEF */
.brief-wrap{flex:1;overflow-y:auto;padding:24px 28px;}
.brief-greeting{font-family:var(--serif);font-size:28px;margin-bottom:4px;}
.brief-sub{color:var(--muted);font-size:14px;margin-bottom:22px;line-height:1.6;}
.brief-section{margin-bottom:18px;}
.brief-section h3{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:9px;}
.brief-cards{display:flex;flex-direction:column;gap:7px;}
.brief-card{background:var(--paper);border:1px solid var(--border);border-radius:8px;padding:11px 14px;font-size:13px;line-height:1.5;display:flex;align-items:flex-start;gap:10px;}
.brief-card-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.brief-card-body{flex:1;}
.brief-card-reason{font-size:11px;color:var(--muted);margin-top:3px;}
.brief-card-impact{font-size:11px;color:var(--red);margin-top:3px;}
.brief-card-badge{font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:10px;background:#eef4fb;color:var(--blue);white-space:nowrap;margin-top:4px;display:inline-block;}
.btn-start-day{background:var(--orange);color:#fff;border:none;border-radius:8px;padding:12px 24px;font-family:var(--font);font-weight:600;font-size:14px;cursor:pointer;transition:opacity .2s;margin-top:10px;}
.btn-start-day:hover{opacity:.85;}

/* DAILY BOARD */
.add-bar{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;gap:8px;background:var(--paper);}
.add-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--ink);font-family:var(--font);font-size:13px;padding:8px 12px;outline:none;}
.add-input:focus{border-color:var(--orange);}
.add-btn{background:var(--ink);color:var(--bg);border:none;border-radius:8px;padding:8px 14px;font-family:var(--font);font-weight:500;font-size:13px;cursor:pointer;white-space:nowrap;transition:opacity .2s;}
.add-btn:hover{opacity:.8;}
.stats-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--border);background:var(--paper);}
.stats-left{display:flex;gap:14px;}
.stat{font-size:12px;color:var(--muted);font-family:var(--mono);}
.stat span{color:var(--ink);font-weight:500;}
.btn-eod{background:var(--ink);color:var(--bg);border:none;border-radius:6px;padding:5px 12px;font-size:12px;font-family:var(--font);cursor:pointer;transition:opacity .2s;}
.btn-eod:hover{opacity:.8;}
.board-wrap{flex:1;overflow-x:auto;overflow-y:hidden;display:flex;}
.col{min-width:195px;max-width:195px;display:flex;flex-direction:column;border-right:1px solid var(--border);}
.col-head{padding:11px 13px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--border);background:var(--paper);}
.col-stripe{width:3px;height:13px;border-radius:2px;flex-shrink:0;}
.col-tasks{flex:1;overflow-y:auto;padding:9px;display:flex;flex-direction:column;gap:7px;}
.card{background:var(--paper);border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-size:12px;line-height:1.5;position:relative;transition:border-color .15s,transform .15s;}
.card:hover{border-color:var(--orange);transform:translateY(-1px);}
.card.done{opacity:.38;}
.card.done .card-text{text-decoration:line-through;}
.card-text{padding-right:22px;}
.card-dl{font-size:10px;font-family:var(--mono);color:var(--blue);margin-top:4px;}
.card-dl.near{color:var(--red);}
.card-note{font-size:10px;color:var(--muted);margin-top:3px;}
.card-check{position:absolute;top:7px;right:7px;width:17px;height:17px;border:1.5px solid var(--border);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .15s;background:transparent;}
.card-check.on{background:var(--green);border-color:var(--green);color:#fff;}
.empty-col{font-size:11px;color:var(--border);text-align:center;padding:14px 6px;}

/* REVIEW */
.review-outer{flex:1;overflow-y:auto;}
.review-wrap{padding:20px;display:flex;flex-direction:column;gap:14px;}
.review-title{font-family:var(--serif);font-size:22px;margin-bottom:4px;}
.review-section{background:var(--paper);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
.review-section h3{font-size:12px;font-weight:600;margin-bottom:11px;display:flex;align-items:center;gap:7px;}
.review-item{display:flex;align-items:flex-start;gap:9px;padding:8px 10px;border-radius:7px;background:var(--surface);font-size:13px;margin-bottom:7px;}
.review-item-text{flex:1;line-height:1.5;}
.review-actions{display:flex;gap:5px;flex-shrink:0;margin-top:2px;}
.rac{font-size:11px;padding:3px 9px;border-radius:5px;border:1px solid var(--border);cursor:pointer;font-family:var(--font);transition:all .15s;background:var(--paper);}
.rac.done2{border-color:var(--green);color:var(--green);}
.rac.migrate{border-color:var(--blue);color:var(--blue);}
.rac.drop{border-color:var(--red);color:var(--red);}
.rac:disabled{opacity:.4;cursor:default;}
.ai-summary-box{font-size:13px;line-height:1.7;color:var(--ink);}

/* KHO */
.kho-outer{flex:1;overflow-y:auto;}
.kho-wrap{padding:20px;}
.kho-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.kho-title{font-family:var(--serif);font-size:22px;}
.kho-count{font-family:var(--mono);font-size:12px;color:var(--muted);}
.kho-group{margin-bottom:18px;}
.kho-group-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:7px;}
.kho-card{background:var(--paper);border:1px solid var(--border);border-radius:8px;padding:10px 13px;font-size:13px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px;}
.kho-card-body{flex:1;}
.kho-card-note{font-size:11px;color:var(--muted);margin-top:3px;}
.kho-card-meta{font-size:10px;color:var(--muted);font-family:var(--mono);}
.kho-actions{display:flex;gap:5px;flex-shrink:0;flex-direction:column;align-items:flex-end;}
.kbtn{font-size:10px;padding:3px 8px;border-radius:5px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-family:var(--font);transition:all .15s;white-space:nowrap;}
.kbtn:hover{border-color:var(--orange);color:var(--orange);}
.kbtn.del:hover{border-color:var(--red);color:var(--red);}

/* Loading */
.loading-dot{animation:blink 1.2s infinite;display:inline-block;}
.loading-dot:nth-child(2){animation-delay:.2s;}
.loading-dot:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--ink);color:var(--bg);padding:10px 16px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo"><div class="logo-dot"></div>Thư Ký</div>
  <div class="topbar-right">
    <div class="date-chip" id="dateChip"></div>
    <div class="api-wrap">
      <span class="api-label">Claude API</span>
      <input class="api-input" id="apiInput" type="password" placeholder="sk-ant-..." oninput="onApiKey(this.value)">
    </div>
    <button class="drive-btn" id="driveBtn" onclick="handleDriveAuth()">
      <div class="drive-dot" id="driveDot"></div>
      <span id="driveBtnText">Kết nối Drive</span>
    </button>
    <span class="sync-status" id="syncStatus"></span>
  </div>
</div>

<!-- MODES -->
<div class="modes">
  <button class="mode-btn active" id="tab-brief" onclick="setMode('brief')">☀ Sáng</button>
  <button class="mode-btn" id="tab-daily" onclick="setMode('daily')">📋 Hôm nay</button>
  <button class="mode-btn" id="tab-review" onclick="setMode('review')">🌙 Tổng kết</button>
  <button class="mode-btn" id="tab-kho" onclick="setMode('kho')">🗄 Kho việc</button>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- CHAT -->
  <div class="chat-panel">
    <div class="chat-header">
      <div class="chat-title">Thư ký AI</div>
      <div class="mode-badge" id="modeBadge">Chào buổi sáng</div>
    </div>
    <div class="chat-msgs" id="chatMsgs"></div>
    <div class="chat-input-wrap">
      <div class="quick-btns">
        <button class="qbtn" onclick="quickSend('Giờ này anh làm gì được?')">Làm gì giờ?</button>
        <button class="qbtn" onclick="quickSend('Stress quá, việc nào quan trọng nhất cần làm ngay?')">Stress ơi</button>
        <button class="qbtn" onclick="quickSend('Tổng quan hôm nay thế nào?')">Overview</button>
        <button class="qbtn" onclick="quickSend('Còn bao nhiêu việc chưa xong hôm nay?')">Còn bao nhiêu?</button>
      </div>
      <div class="chat-row">
        <textarea class="chat-input" id="chatInput" placeholder="Nhắn gì cũng được…" rows="1"
          onkeydown="onChatKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" onclick="sendChat()">↑</button>
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right-panel">

    <!-- BRIEF -->
    <div id="view-brief" class="brief-wrap">
      <div class="brief-greeting" id="briefGreeting">Chào buổi sáng, Luan.</div>
      <div class="brief-sub" id="briefSub">Đang chuẩn bị brief…</div>
      <div id="briefContent"></div>
    </div>

    <!-- DAILY -->
    <div id="view-daily" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
      <div class="add-bar">
        <input class="add-input" id="addInput" placeholder="Nhập việc mới bất kỳ — thô cũng được…" onkeydown="if(event.key==='Enter')addTask()">
        <button class="add-btn" onclick="addTask()">+ Thêm</button>
      </div>
      <div class="stats-bar">
        <div class="stats-left">
          <div class="stat">Xong: <span id="sDone">0</span></div>
          <div class="stat">Còn: <span id="sLeft">0</span></div>
          <div class="stat">Kho: <span id="sKho">0</span></div>
        </div>
        <button class="btn-eod" onclick="setMode('review')">🌙 Tổng kết ngày</button>
      </div>
      <div class="board-wrap" id="boardWrap"></div>
    </div>

    <!-- REVIEW -->
    <div id="view-review" class="review-outer" style="display:none;">
      <div class="review-wrap" id="reviewContent"></div>
    </div>

    <!-- KHO -->
    <div id="view-kho" class="kho-outer" style="display:none;">
      <div class="kho-wrap">
        <div class="kho-header">
          <div class="kho-title">Kho việc</div>
          <div class="kho-count" id="khoCount">0 đầu việc</div>
        </div>
        <div id="khoContent"></div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════
const GOOGLE_CLIENT_ID = '356592007545-e6poq5irp699hj93vfvkqjl7uh5mdggm.apps.googleusercontent.com';
const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file';
const FOLDER_NAME = 'Thư Ký AI';
const FILE_NAME   = 'secretary_data.json';

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let S = { tasks:[], kho:[], chatLog:[] };
let chatHistory = [];
let driveToken  = null;
let driveFolderId = null;
let driveFileId   = null;
let currentMode = 'brief';
let syncTimer   = null;

const COLS = [
  {id:'urgent',    label:'Gấp hôm nay',       color:'#c0392b'},
  {id:'today',     label:'Quan trọng hôm nay', color:'#ec872b'},
  {id:'presence',  label:'Cần có mặt',         color:'#2c5f8a'},
  {id:'important', label:'Quan trọng',         color:'#b8860b'},
  {id:'should',    label:'Nên làm',            color:'#2d7d5f'},
  {id:'want',      label:'Muốn làm',           color:'#6b4c9a'},
  {id:'other',     label:'Khác',               color:'#8a8478'},
];

// ═══════════════════════════════════════════════════
// LOCAL STORAGE (fallback khi chưa connect Drive)
// ═══════════════════════════════════════════════════
const LS = {
  saveApi(v){ try{localStorage.setItem('tk_api',v);}catch(e){} },
  loadApi(){ try{return localStorage.getItem('tk_api')||'';}catch(e){return '';} },
  saveToken(t){ try{localStorage.setItem('tk_gtoken',t);}catch(e){} },
  loadToken(){ try{return localStorage.getItem('tk_gtoken')||null;}catch(e){return null;} },
  saveLocal(){ try{localStorage.setItem('tk_data',JSON.stringify(S));}catch(e){} },
  loadLocal(){ try{const d=localStorage.getItem('tk_data');return d?JSON.parse(d):null;}catch(e){return null;} },
};

// ═══════════════════════════════════════════════════
// GOOGLE DRIVE
// ═══════════════════════════════════════════════════
function handleDriveAuth(){
  if(driveToken){ driveDisconnect(); return; }
  const client = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: DRIVE_SCOPE,
    callback: async(resp)=>{
      if(resp.error){ showToast('❌ Lỗi đăng nhập Google'); return; }
      driveToken = resp.access_token;
      LS.saveToken(driveToken);
      setDriveUI(true);
      showToast('✓ Đã kết nối Google Drive');
      await driveInit();
    }
  });
  client.requestAccessToken();
}

function driveDisconnect(){
  driveToken=null; driveFolderId=null; driveFileId=null;
  LS.saveToken('');
  setDriveUI(false);
  showToast('Đã ngắt kết nối Drive');
}

function setDriveUI(on){
  document.getElementById('driveDot').className='drive-dot'+(on?' on':'');
  document.getElementById('driveBtnText').textContent=on?'Drive ✓':'Kết nối Drive';
  document.getElementById('driveBtn').className='drive-btn'+(on?' connected':'');
}

async function driveInit(){
  // Find or create folder
  let res = await driveReq(`https://www.googleapis.com/drive/v3/files?q=name='${FOLDER_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false&fields=files(id,name)`);
  if(res.files?.length){ driveFolderId=res.files[0].id; }
  else {
    const f = await driveReq('https://www.googleapis.com/drive/v3/files',{method:'POST',body:JSON.stringify({name:FOLDER_NAME,mimeType:'application/vnd.google-apps.folder'})});
    driveFolderId=f.id;
  }
  // Find or load data file
  res = await driveReq(`https://www.googleapis.com/drive/v3/files?q=name='${FILE_NAME}' and '${driveFolderId}' in parents and trashed=false&fields=files(id,name)`);
  if(res.files?.length){
    driveFileId=res.files[0].id;
    await driveLoad();
  } else {
    await driveSave(); // create new
  }
  renderAll();
  setSyncStatus('✓ Drive đồng bộ');
}

async function driveLoad(){
  const res = await fetch(`https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`,{
    headers:{Authorization:'Bearer '+driveToken}
  });
  if(!res.ok) return;
  const data = await res.json();
  if(data && data.tasks !== undefined) S = data;
  setSyncStatus('✓ Đã tải từ Drive');
}

async function driveSave(){
  setSyncStatus('⟳ Đang lưu…');
  const body = JSON.stringify(S, null, 2);
  const blob = new Blob([body],{type:'application/json'});
  if(!driveFileId){
    // Create
    const meta = JSON.stringify({name:FILE_NAME,parents:[driveFolderId]});
    const form = new FormData();
    form.append('metadata',new Blob([meta],{type:'application/json'}));
    form.append('file',blob);
    const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{
      method:'POST',headers:{Authorization:'Bearer '+driveToken},body:form
    });
    const data = await res.json();
    driveFileId = data.id;
  } else {
    // Update
    await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`,{
      method:'PATCH',headers:{Authorization:'Bearer '+driveToken,'Content-Type':'application/json'},body
    });
  }
  setSyncStatus('✓ Drive đã lưu lúc '+new Date().toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'}));
  LS.saveLocal();
}

async function driveReq(url, opts={}){
  const res = await fetch(url,{
    ...opts,
    headers:{'Authorization':'Bearer '+driveToken,'Content-Type':'application/json',...(opts.headers||{})}
  });
  return res.json();
}

function scheduleSave(){
  LS.saveLocal();
  if(!driveToken) return;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(driveSave, 2000);
}

function setSyncStatus(t){ document.getElementById('syncStatus').textContent=t; }

// ═══════════════════════════════════════════════════
// CLAUDE API
// ═══════════════════════════════════════════════════
function getApiKey(){ return (document.getElementById('apiInput').value||'').trim(); }
function onApiKey(v){ LS.saveApi(v); }

async function claude(system, messages, json=false){
  const key=getApiKey();
  if(!key) throw new Error('NO_KEY');
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,system,messages})
  });
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error?.message||'HTTP '+res.status);}
  const d=await res.json();
  const text=d.content?.[0]?.text||'';
  if(json){try{return JSON.parse(text.replace(/```json|```/g,'').trim());}catch(e){throw new Error('Parse lỗi');}}
  return text;
}

function buildCtx(){
  const done=S.tasks.filter(t=>t.status==='done').length;
  const left=S.tasks.filter(t=>t.status==='active').length;
  return `Ngày hôm nay: ${new Date().toLocaleDateString('vi-VN',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric'})}
Anh tên Luan, chủ Lantern Travel (du lịch inbound miền Bắc Việt Nam) và Lumi Á Đông Travel (outbound Nhật, Trung, Hàn). Làm theo Bullet Journal.

CÔNG VIỆC HÔM NAY (${done} xong / ${left} còn lại):
${S.tasks.map(t=>`[${t.col}|${t.status}] ${t.text}${t.deadline?' (deadline:'+t.deadline+')':''}${t.note?' — '+t.note:''}`).join('\n')||'(chưa có)'}

KHO VIỆC (backlog migrate):
${S.kho.filter(t=>t.status!=='dropped').map(t=>`[${t.col}] ${t.text}${t.deadline?' ('+t.deadline+')':''}`).join('\n')||'(rỗng)'}`;
}

// ═══════════════════════════════════════════════════
// MORNING BRIEF
// ═══════════════════════════════════════════════════
async function morningBrief(){
  const h=new Date().getHours();
  const g=h<12?'Chào buổi sáng':h<18?'Xin chào':h<21?'Chào buổi tối':'Chào anh';
  document.getElementById('briefGreeting').textContent=`${g}, Luan.`;
  if(!getApiKey()){
    document.getElementById('briefSub').textContent='Nhập Claude API key ở trên để bắt đầu.';
    addMsg('ai','Anh nhập Claude API key vào ô bên trên (sk-ant-...) để em brief cho anh nhé. Lấy key tại console.anthropic.com');
    return;
  }
  document.getElementById('briefSub').textContent='Đang chuẩn bị brief…';
  const loadId=addLoading();
  const sys=`Bạn là thư ký AI. Tạo morning brief thực tế, ngắn gọn. Trả về JSON thuần:
{"greeting":"1 câu nhận xét tình hình","focus":[{"text":"việc cần làm","reason":"lý do ngắn","urgency":"high|mid|low","deadline":"nếu có hoặc null"}],"bottleneck":[{"text":"việc sẽ gây tắc nghẽn","impact":"hậu quả"}],"from_kho":[{"text":"việc từ kho nên làm hôm nay","reason":"lý do"}],"summary":"1-2 câu tổng quan để anh bắt đầu ngày"}`;
  try{
    const r=await claude(sys,[{role:'user',content:buildCtx()}],true);
    removeMsg(loadId);
    const bc=document.getElementById('briefContent');
    bc.innerHTML='';
    if(r.focus?.length) bc.innerHTML+=section('⚡ Cần làm hôm nay',r.focus.map(t=>`<div class="brief-card"><div class="brief-card-dot" style="background:${t.urgency==='high'?'#c0392b':t.urgency==='mid'?'#ec872b':'#2d7d5f'}"></div><div class="brief-card-body"><div>${t.text}</div>${t.reason?`<div class="brief-card-reason">${t.reason}</div>`:''}${t.deadline?`<span class="brief-card-badge">📅 ${t.deadline}</span>`:''}</div></div>`).join(''));
    if(r.bottleneck?.length) bc.innerHTML+=section('🚧 Cổ chai cần tránh',r.bottleneck.map(t=>`<div class="brief-card"><div class="brief-card-dot" style="background:#c0392b"></div><div class="brief-card-body"><div>${t.text}</div>${t.impact?`<div class="brief-card-impact">→ ${t.impact}</div>`:''}</div></div>`).join(''));
    if(r.from_kho?.length) bc.innerHTML+=section('🗄 Từ Kho — nên làm hôm nay',r.from_kho.map(t=>`<div class="brief-card"><div class="brief-card-dot" style="background:#2c5f8a"></div><div class="brief-card-body"><div>${t.text}</div>${t.reason?`<div class="brief-card-reason">${t.reason}</div>`:''}</div></div>`).join(''));
    bc.innerHTML+=`<button class="btn-start-day" onclick="setMode('daily')">Bắt đầu ngày → Mở bảng công việc</button>`;
    document.getElementById('briefSub').textContent=r.summary||'';
    addMsg('ai',(r.greeting||'Chào anh!')+'\n\n'+(r.summary||'Hôm nay cũng sẽ là một ngày tốt.'));
    chatHistory=[{role:'user',content:buildCtx()},{role:'assistant',content:JSON.stringify(r)}];
  }catch(e){
    removeMsg(loadId);
    const m=e.message==='NO_KEY'?'Anh nhập API key nhé!':'Lỗi: '+e.message;
    document.getElementById('briefSub').textContent=m;
    addMsg('ai',m);
  }
}
function section(title,inner){ return `<div class="brief-section"><h3>${title}</h3><div class="brief-cards">${inner}</div></div>`; }

// ═══════════════════════════════════════════════════
// ADD TASK
// ═══════════════════════════════════════════════════
async function addTask(){
  const inp=document.getElementById('addInput');
  const raw=inp.value.trim();
  if(!raw) return;
  inp.value='';
  if(!getApiKey()){addMsg('ai','Anh nhập Claude API key ở trên nhé!');return;}
  addMsg('user',raw);
  const loadId=addLoading();
  const sys=`Bạn là thư ký AI của anh Luan. Phân tích input và trả về JSON thuần:
{"tasks":[{"id":"t${Date.now()}","text":"tên việc ngắn gọn rõ ràng","col":"urgent|today|presence|important|should|want|other","deadline":"text tự nhiên hoặc null","note":"ghi chú hoặc null","status":"active"}],"clarify":"câu hỏi làm rõ nếu cần, null nếu không","reply":"phản hồi ngắn cho anh"}
Nếu có nhiều việc thì tách ra nhiều task. Deadline dạng "thứ 6", "tuần sau", "15/5" v.v.
col: urgent=gấp ngay hôm nay, today=quan trọng hôm nay, presence=cần có mặt, important=quan trọng chưa cần ngay, should=nên làm, want=muốn làm, other=khác`;
  try{
    const r=await claude(sys,[{role:'user',content:'Context:\n'+buildCtx()+'\n\nInput mới: '+raw}],true);
    removeMsg(loadId);
    if(r.tasks?.length){ r.tasks.forEach(t=>S.tasks.push(t)); scheduleSave(); renderBoard(); }
    addMsg('ai',r.reply+(r.clarify?'\n\n'+r.clarify:''));
    chatHistory.push({role:'user',content:raw},{role:'assistant',content:JSON.stringify(r)});
  }catch(e){ removeMsg(loadId); addMsg('ai','Lỗi: '+e.message); }
}

// ═══════════════════════════════════════════════════
// CHAT
// ═══════════════════════════════════════════════════
async function sendChat(){
  const inp=document.getElementById('chatInput');
  const msg=inp.value.trim();
  if(!msg) return;
  inp.value=''; autoResize(inp);
  if(!getApiKey()){addMsg('ai','Anh nhập Claude API key ở trên nhé!');return;}
  addMsg('user',msg);
  const loadId=addLoading();
  const sys=`Bạn là thư ký AI của anh Luan. Trả lời ngắn gọn, thực tế, tiếng Việt.
Khi anh hỏi "làm gì giờ" → gợi ý 2-3 việc phù hợp thời điểm + lý do ngắn.
Khi anh stress → chọn 3 việc KEY nhất có impact lớn nhất nếu bỏ qua, giải thích ngắn tại sao.
Khi hỏi overview → tóm tắt tình hình done/còn lại, nhận xét ngắn.
${buildCtx()}`;
  try{
    const reply=await claude(sys,[...chatHistory,{role:'user',content:msg}]);
    removeMsg(loadId);
    addMsg('ai',reply);
    chatHistory.push({role:'user',content:msg},{role:'assistant',content:reply});
    if(chatHistory.length>24) chatHistory=chatHistory.slice(-24);
  }catch(e){ removeMsg(loadId); addMsg('ai','Lỗi: '+e.message); }
}
function quickSend(t){ document.getElementById('chatInput').value=t; sendChat(); }
function onChatKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();} }
function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,90)+'px'; }

// ═══════════════════════════════════════════════════
// REVIEW
// ═══════════════════════════════════════════════════
async function buildReview(){
  const el=document.getElementById('reviewContent');
  const done=S.tasks.filter(t=>t.status==='done');
  const active=S.tasks.filter(t=>t.status==='active');
  const today=new Date().toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit',year:'numeric'});
  let html=`<div class="review-title">Tổng kết ${today}</div>`;
  // Done
  html+=`<div class="review-section"><h3>✅ Đã xong (${done.length})</h3>${done.length?done.map(t=>`<div class="review-item"><div class="review-item-text">${t.text}</div></div>`).join(''):'<div style="color:var(--muted);font-size:13px">Chưa tick xong việc nào</div>'}</div>`;
  // Active
  if(active.length){
    html+=`<div class="review-section"><h3>📋 Chưa xong — chọn hướng xử lý (${active.length})</h3>${active.map(t=>`<div class="review-item" id="ri_${t.id}"><div class="review-item-text">${t.text}${t.deadline?` <span style="font-size:10px;color:var(--blue);font-family:var(--mono)">${t.deadline}</span>`:''}</div><div class="review-actions"><button class="rac done2" onclick="reviewAct('${t.id}','done')">✓ Xong</button><button class="rac migrate" onclick="reviewAct('${t.id}','migrate')">→ Kho</button><button class="rac drop" onclick="reviewAct('${t.id}','drop')">✕ Bỏ</button></div></div>`).join('')}</div>`;
  }
  html+=`<div class="review-section"><h3>🤖 Thư ký tổng kết</h3><div class="ai-summary-box" id="aiSumBox"><span style="color:var(--muted)">Đang phân tích…</span></div></div>`;
  el.innerHTML=html;
  // AI summary
  if(getApiKey()){
    try{
      const s=await claude(`Tổng kết ngày làm việc ngắn gọn 3-5 câu tiếng Việt theo phong cách Bullet Journal: làm được gì, chưa làm gì, nhận xét, 1 gợi ý cho ngày mai.`,[{role:'user',content:buildCtx()}]);
      document.getElementById('aiSumBox').textContent=s;
      addMsg('ai',s);
    }catch(e){ document.getElementById('aiSumBox').textContent='Không lấy được tổng kết ('+e.message+')'; }
  } else { document.getElementById('aiSumBox').textContent='Cần Claude API key.'; }
}

function reviewAct(id, action){
  const t=S.tasks.find(t=>t.id===id);
  if(!t) return;
  if(action==='done') t.status='done';
  else if(action==='migrate'){
    t.status='migrated';
    S.kho.push({...t, id:'k'+Date.now(), migratedAt:new Date().toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit'}), status:'active'});
  } else { t.status='dropped'; }
  scheduleSave(); renderBoard(); renderKho();
  const ri=document.getElementById('ri_'+id);
  if(ri){
    ri.style.opacity='.35';
    ri.querySelectorAll('.rac').forEach(b=>{b.disabled=true;});
    ri.querySelector('.review-actions').innerHTML=`<span style="font-size:11px;color:var(--muted)">${{done:'✓ Xong',migrate:'→ Vào Kho',drop:'✕ Bỏ'}[action]}</span>`;
  }
}

// ═══════════════════════════════════════════════════
// BOARD
// ═══════════════════════════════════════════════════
function renderBoard(){
  const board=document.getElementById('boardWrap');
  board.innerHTML='';
  let done=0,left=0;
  COLS.forEach(col=>{
    const tasks=S.tasks.filter(t=>t.col===col.id&&(t.status==='active'||t.status==='done'));
    done+=tasks.filter(t=>t.status==='done').length;
    left+=tasks.filter(t=>t.status==='active').length;
    const colEl=document.createElement('div'); colEl.className='col';
    colEl.innerHTML=`<div class="col-head"><div class="col-stripe" style="background:${col.color}"></div>${col.label}<span style="margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--muted)">${tasks.length}</span></div><div class="col-tasks" id="ct_${col.id}"></div>`;
    board.appendChild(colEl);
    const te=colEl.querySelector('.col-tasks');
    if(!tasks.length){te.innerHTML='<div class="empty-col">—</div>';return;}
    tasks.forEach(t=>{
      const d=t.status==='done';
      const c=document.createElement('div'); c.className='card'+(d?' done':'');
      c.innerHTML=`<div class="card-check${d?' on':''}" onclick="toggleDone('${t.id}',event)">${d?'✓':''}</div><div class="card-text">${t.text}</div>${t.deadline?`<div class="card-dl">${t.deadline}</div>`:''} ${t.note?`<div class="card-note">${t.note}</div>`:''}`;
      te.appendChild(c);
    });
  });
  document.getElementById('sDone').textContent=done;
  document.getElementById('sLeft').textContent=left;
  document.getElementById('sKho').textContent=S.kho.filter(t=>t.status==='active').length;
}

function toggleDone(id,e){
  e.stopPropagation();
  const t=S.tasks.find(t=>t.id===id);
  if(t){t.status=t.status==='done'?'active':'done';scheduleSave();renderBoard();}
}

// ═══════════════════════════════════════════════════
// KHO
// ═══════════════════════════════════════════════════
function renderKho(){
  const active=S.kho.filter(t=>t.status==='active');
  document.getElementById('khoCount').textContent=active.length+' đầu việc';
  const el=document.getElementById('khoContent');
  if(!active.length){el.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted);font-size:13px">Kho trống 🎉</div>';return;}
  const grouped={};
  COLS.forEach(c=>{grouped[c.id]=[];});
  active.forEach(t=>{(grouped[t.col]||grouped['other']).push(t);});
  el.innerHTML='';
  COLS.forEach(col=>{
    if(!grouped[col.id]?.length) return;
    const g=document.createElement('div'); g.className='kho-group';
    g.innerHTML=`<div class="kho-group-label">${col.label}</div>${grouped[col.id].map(t=>`<div class="kho-card"><div class="kho-card-body"><div>${t.text}</div>${t.note?`<div class="kho-card-note">${t.note}</div>`:''}</div><div class="kho-actions">${t.migratedAt?`<div class="kho-card-meta">từ ${t.migratedAt}</div>`:''}${t.deadline?`<div class="kho-card-meta" style="color:var(--blue)">📅 ${t.deadline}</div>`:''}<div style="display:flex;gap:5px"><button class="kbtn" onclick="khoToDay('${t.id}')">→ Hôm nay</button><button class="kbtn del" onclick="khoRemove('${t.id}')">✕</button></div></div></div>`).join('')}`;
    el.appendChild(g);
  });
}

function khoToDay(id){
  const i=S.kho.findIndex(t=>t.id===id);
  if(i<0) return;
  const t={...S.kho[i],id:'t'+Date.now(),status:'active'};
  S.tasks.push(t); S.kho.splice(i,1);
  scheduleSave(); renderBoard(); renderKho();
  addMsg('ai',`Đã kéo "${t.text}" vào bảng hôm nay.`);
}
function khoRemove(id){
  if(!confirm('Bỏ việc này khỏi Kho?')) return;
  S.kho=S.kho.filter(t=>t.id!==id);
  scheduleSave(); renderKho();
}

// ═══════════════════════════════════════════════════
// MODES
// ═══════════════════════════════════════════════════
function setMode(mode){
  currentMode=mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+mode)?.classList.add('active');
  const badges={brief:'Chào buổi sáng',daily:'Trong ngày',review:'Tổng kết',kho:'Kho việc'};
  document.getElementById('modeBadge').textContent=badges[mode]||'';
  ['brief','daily','review','kho'].forEach(v=>{
    const el=document.getElementById('view-'+v);
    if(!el) return;
    const isBrief=v==='brief';
    el.style.display=v===mode?(isBrief?'block':'flex'):'none';
  });
  if(mode==='review') buildReview();
  if(mode==='kho') renderKho();
}

// ═══════════════════════════════════════════════════
// CHAT UI HELPERS
// ═══════════════════════════════════════════════════
let lc=0;
function addMsg(role,text){
  const el=document.createElement('div');
  el.className='msg '+role; el.textContent=text;
  const msgs=document.getElementById('chatMsgs');
  msgs.appendChild(el); msgs.scrollTop=msgs.scrollHeight;
  return el;
}
function addLoading(){
  const id='ld'+(++lc);
  const el=document.createElement('div');
  el.className='msg ai'; el.id=id;
  el.innerHTML='<span class="loading-dot">●</span><span class="loading-dot">●</span><span class="loading-dot">●</span>';
  const msgs=document.getElementById('chatMsgs');
  msgs.appendChild(el); msgs.scrollTop=msgs.scrollHeight;
  return id;
}
function removeMsg(id){ document.getElementById(id)?.remove(); }
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
function renderAll(){ renderBoard(); renderKho(); }

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
function init(){
  // Date
  document.getElementById('dateChip').textContent=
    new Date().toLocaleDateString('vi-VN',{weekday:'short',day:'2-digit',month:'2-digit'});
  // API key
  const savedKey=LS.loadApi();
  if(savedKey) document.getElementById('apiInput').value=savedKey;
  // Load local data as fallback
  const local=LS.loadLocal();
  if(local) S=local;
  renderAll();
  // Try reconnect Drive with saved token
  const savedToken=LS.loadToken();
  if(savedToken){
    driveToken=savedToken;
    setDriveUI(true);
    driveInit().catch(()=>{ driveToken=null; setDriveUI(false); setSyncStatus('Drive token hết hạn — đăng nhập lại'); });
  }
  // Morning brief
  morningBrief();
}

window.addEventListener('load', init);
